<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alive — LLM Debug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #F5F0E8;
  --bg-panel: #FEFCF7;
  --bg-inset: #EDE8DD;
  --bg-deep: #E6DFD2;
  --brown-dark: #5C4A3A;
  --brown-mid: #8B7355;
  --brown-light: #B5A68C;
  --green-leaf: #6B8F5E;
  --green-pale: #C5D9B2;
  --terra: #C17850;
  --terra-soft: #D9A07E;
  --blue-sky: #7BA3C7;
  --blue-soft: #A8C8E0;
  --gold-warm: #D4A847;
  --gold-pale: #E8CE80;
  --pink-blossom: #D4889A;
  --purple-berry: #9878A8;
  --text-primary: #3D3229;
  --text-secondary: #7A6E5F;
  --text-dim: #A89E8E;
  --border-main: #B5A68C;
  --border-dark: #8B7355;
  --font-pixel: 'Press Start 2P', 'DotGothic16', monospace;
  --font-pixel-jp: 'DotGothic16', monospace;
  --font-body: 'Zen Maru Gothic', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;
  --px: 3px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(92,74,58,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(92,74,58,0.015) 1px, transparent 1px);
  background-size: 16px 16px;
  pointer-events: none;
  z-index: 0;
}

/* === LAYOUT === */
.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--bg-panel);
  border-bottom: var(--px) solid var(--border-dark);
  box-shadow: 0 var(--px) 0 0 var(--brown-dark);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-title {
  font-family: var(--font-pixel);
  font-size: 10px;
  color: var(--brown-dark);
  letter-spacing: 1px;
}
.header-title .leaf {
  display: inline-block;
  width: 12px; height: 12px;
  background: var(--green-leaf);
  clip-path: polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%);
  margin-right: 6px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.refresh-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}
.toggle-dot {
  width: 20px; height: 10px;
  border: 2px solid var(--border-dark);
  position: relative;
  background: var(--bg-inset);
  cursor: pointer;
}
.toggle-dot.on { background: var(--green-leaf); border-color: var(--green-leaf); }
.toggle-dot::after {
  content: '';
  position: absolute;
  top: 1px; left: 1px;
  width: 6px; height: 6px;
  background: var(--bg-panel);
  transition: left 0.15s ease;
}
.toggle-dot.on::after { left: 11px; }
.back-link {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--brown-mid);
  text-decoration: none;
  border: 2px solid var(--border-main);
  padding: 4px 10px;
  background: var(--bg-panel);
  box-shadow: 2px 2px 0 0 var(--border-dark);
}
.back-link:hover { background: var(--bg-inset); }

/* === MAIN SPLIT === */
.main {
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
}

/* === LEFT: Call List === */
.call-list-panel {
  background: var(--bg-panel);
  border-right: var(--px) solid var(--border-main);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.call-list-header {
  padding: 10px 14px 8px;
  border-bottom: 2px dashed var(--bg-inset);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.call-list-title {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  color: var(--brown-dark);
}
.call-list-count {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-dim);
}
.call-list-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.call-item {
  padding: 8px 14px;
  cursor: pointer;
  border-left: 4px solid transparent;
  transition: background 0.15s ease;
  border-bottom: 1px solid var(--bg-inset);
}
.call-item:hover { background: var(--bg-inset); }
.call-item.selected {
  background: var(--bg-inset);
  border-left-color: var(--terra);
}
.call-item-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.caller-dot {
  width: 8px; height: 8px;
  border-radius: 0;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.1);
}
.call-item-caller {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.call-item-time {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  white-space: nowrap;
}
.call-item-meta {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
}
.call-item-error { color: var(--terra); }
.load-more-btn {
  display: block;
  width: calc(100% - 28px);
  margin: 8px 14px;
  padding: 6px;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  box-shadow: 2px 2px 0 0 var(--border-dark);
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  color: var(--brown-mid);
  cursor: pointer;
  text-align: center;
}
.load-more-btn:hover { background: var(--bg-deep); }
.load-more-btn:disabled { opacity: 0.4; cursor: default; }

/* === RIGHT: Detail Pane === */
.detail-pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-page);
}
.detail-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-pixel-jp);
  font-size: 13px;
  color: var(--text-dim);
}
.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
  padding: 10px 14px;
  background: var(--bg-panel);
  border: var(--px) solid var(--border-main);
  box-shadow: var(--px) var(--px) 0 0 var(--border-dark);
}
.meta-chip {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.meta-label {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.meta-value {
  font-family: var(--font-pixel-jp);
  font-size: 12px;
  color: var(--text-primary);
  font-weight: 700;
}
.meta-value.error { color: var(--terra); }

.section-label {
  font-family: var(--font-pixel-jp);
  font-size: 12px;
  background: var(--brown-dark);
  color: var(--bg-panel);
  display: inline-block;
  padding: 3px 12px 3px 8px;
  margin-bottom: 6px;
  position: relative;
}
.section-label::after {
  content: '';
  position: absolute;
  right: -10px; top: 0;
  width: 10px; height: 100%;
  background: var(--brown-dark);
  clip-path: polygon(0 0, 0 100%, 100% 100%);
}

.code-block {
  background: var(--bg-panel);
  border: var(--px) solid var(--border-main);
  box-shadow: var(--px) var(--px) 0 0 var(--border-dark);
  overflow-x: auto;
}
.code-block pre {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-primary);
  padding: 14px 16px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-inset); }
::-webkit-scrollbar-thumb { background: var(--border-main); border: 1px solid var(--border-dark); }
::-webkit-scrollbar-thumb:hover { background: var(--brown-mid); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <span class="header-title"><span class="leaf"></span>ALIVE DEBUG</span>
    </div>
    <div class="header-right">
      <label class="refresh-toggle">
        <span id="refreshLabel">自动刷新</span>
        <div class="toggle-dot on" id="refreshToggle" onclick="toggleRefresh()"></div>
      </label>
      <a href="/" class="back-link">← 主面板</a>
      <a href="/test" class="back-link">🎮 测试</a>
    </div>
  </div>

  <div class="main">
    <!-- Left: call list -->
    <div class="call-list-panel">
      <div class="call-list-header">
        <span class="call-list-title">调用记录</span>
        <span class="call-list-count" id="listCount">—</span>
      </div>
      <div class="call-list-scroll" id="callList"></div>
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()" style="display:none">加载更多</button>
    </div>

    <!-- Right: detail -->
    <div class="detail-pane" id="detailPane">
      <div class="detail-empty">选择左侧记录查看详情</div>
    </div>
  </div>
</div>

<script>
var currentPersona = '';

async function initPersona() {
  try {
    var res = await fetch('/api/personas');
    if (!res.ok) return;
    var data = await res.json();
    currentPersona = data.active || (data.personas && data.personas[0]) || '';
  } catch (e) { /* silent */ }
}

var CALLER_COLORS = {
  'heartbeat-tick':         'var(--terra)',
  'morning-plan':           'var(--gold-warm)',
  'night-reflect':          'var(--blue-sky)',
  'memory-reflect':         'var(--purple-berry)',
  'inspiration-collector':  'var(--green-leaf)',
  'post-pipeline':          'var(--green-leaf)',
  'content-planner':        'var(--green-leaf)',
};
function callerColor(c) { return CALLER_COLORS[c] || 'var(--brown-light)'; }

var state = {
  entries: [],
  total: 0,
  limit: 50,
  selectedId: null,
  autoRefresh: true,
};
var refreshTimer = null;

function toggleRefresh() {
  state.autoRefresh = !state.autoRefresh;
  var dot = document.getElementById('refreshToggle');
  dot.classList.toggle('on', state.autoRefresh);
  if (state.autoRefresh) startRefresh(); else stopRefresh();
}
function startRefresh() {
  stopRefresh();
  refreshTimer = setInterval(fetchLog, 10000);
}
function stopRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

async function fetchLog() {
  try {
    var params = 'limit=' + state.limit + '&offset=0';
    if (currentPersona) params += '&persona=' + encodeURIComponent(currentPersona);
    var res = await fetch('/api/llm-log?' + params);
    if (!res.ok) return;
    var data = await res.json();
    state.total = data.total;
    state.entries = data.entries;
    renderList();
    // Re-select or fallback to first
    if (state.selectedId && !state.entries.find(function(e) { return e.id === state.selectedId; })) {
      state.selectedId = state.entries.length > 0 ? state.entries[0].id : null;
    }
    if (!state.selectedId && state.entries.length > 0) {
      state.selectedId = state.entries[0].id;
    }
    if (state.selectedId) renderDetail(state.entries.find(function(e) { return e.id === state.selectedId; }));
  } catch (e) { /* silent */ }
}

function loadMore() {
  if (state.limit >= 200) return;
  state.limit = Math.min(state.limit + 50, 200);
  fetchLog();
}

function renderList() {
  var el = document.getElementById('callList');
  var countEl = document.getElementById('listCount');
  countEl.textContent = state.entries.length + ' / ' + state.total + ' 条';

  var btn = document.getElementById('loadMoreBtn');
  btn.style.display = (state.total > state.entries.length || state.limit < 200) ? 'block' : 'none';
  btn.disabled = state.limit >= 200;

  el.innerHTML = state.entries.map(function(entry) {
    var color = callerColor(entry.caller);
    var isSelected = entry.id === state.selectedId;
    var time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--';
    var tokStr = (entry.input_tokens != null && entry.output_tokens != null)
      ? entry.input_tokens + '→' + entry.output_tokens + ' tok'
      : '';
    var msStr = entry.elapsed_ms != null ? entry.elapsed_ms + 'ms' : '';
    var isError = entry.finish_reason === 'error';
    return '<div class="call-item' + (isSelected ? ' selected' : '') + '" onclick="selectEntry(\'' + escAttr(entry.id) + '\')">'
      + '<div class="call-item-top">'
      + '<div class="caller-dot" style="background:' + color + ';"></div>'
      + '<span class="call-item-caller" style="color:' + color + ';">' + escHtml(entry.caller || 'unknown') + '</span>'
      + '<span class="call-item-time">' + escHtml(time) + '</span>'
      + '</div>'
      + '<div class="call-item-meta">'
      + (msStr ? '<span>' + escHtml(msStr) + '</span>' : '')
      + (tokStr ? '<span>' + escHtml(tokStr) + '</span>' : '')
      + (isError ? '<span class="call-item-error">ERROR</span>' : '')
      + '</div>'
      + '</div>';
  }).join('');
}

function selectEntry(id) {
  state.selectedId = id;
  var entry = state.entries.find(function(e) { return e.id === id; });
  // Re-highlight in list
  document.querySelectorAll('.call-item').forEach(function(el) {
    el.classList.remove('selected');
  });
  var items = document.querySelectorAll('.call-item');
  var idx = state.entries.findIndex(function(e) { return e.id === id; });
  if (items[idx]) items[idx].classList.add('selected');
  renderDetail(entry);
}

function renderDetail(entry) {
  var pane = document.getElementById('detailPane');
  if (!entry) {
    pane.innerHTML = '<div class="detail-empty">选择左侧记录查看详情</div>';
    return;
  }
  var color = callerColor(entry.caller);
  var time = entry.timestamp ? new Date(entry.timestamp).toLocaleString('zh-CN') : '--';
  var tokIn = entry.input_tokens != null ? entry.input_tokens : '--';
  var tokOut = entry.output_tokens != null ? entry.output_tokens : '--';
  var isError = entry.finish_reason === 'error';

  pane.innerHTML = '<div class="detail-content">'
    + '<div class="detail-meta">'
    + metaChip('来源', '<span style="color:' + color + ';font-family:var(--font-pixel-jp);font-size:12px;font-weight:700;">' + escHtml(entry.caller || 'unknown') + '</span>')
    + metaChip('时间', escHtml(time))
    + metaChip('耗时', escHtml(entry.elapsed_ms != null ? entry.elapsed_ms + ' ms' : '--'))
    + metaChip('输入 tokens', escHtml(String(tokIn)))
    + metaChip('输出 tokens', escHtml(String(tokOut)))
    + metaChip('finish_reason', '<span class="' + (isError ? 'error' : '') + '">' + escHtml(entry.finish_reason || '--') + '</span>')
    + metaChip('模型', escHtml(entry.model || '--'))
    + (isError ? metaChip('错误', '<span class="meta-value error">' + escHtml(entry.error_message || '') + '</span>') : '')
    + '</div>'
    + '<div>'
    + '<div class="section-label">PROMPT</div>'
    + '<div class="code-block"><pre>' + escHtml(entry.prompt || '') + '</pre></div>'
    + '</div>'
    + '<div>'
    + '<div class="section-label">RESPONSE</div>'
    + '<div class="code-block"><pre>' + escHtml(entry.response != null ? entry.response : '(无响应)') + '</pre></div>'
    + '</div>'
    + '</div>';
}

function metaChip(label, valueHtml) {
  return '<div class="meta-chip"><span class="meta-label">' + escHtml(label) + '</span><span class="meta-value">' + valueHtml + '</span></div>';
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function escAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// Boot
initPersona().then(function() { fetchLog(); });
startRefresh();
</script>
</body>
</html>
