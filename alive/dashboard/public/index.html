<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alive Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=Zen+Maru+Gothic:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   ALIVE DASHBOARD
   Stardew Valley × MUJI Aesthetic
   ============================================ */

/* === CUSTOM PROPERTIES === */
:root {
  /* Refined earth palette — deeper contrast */
  --bg-page: #F3EDE3;
  --bg-panel: #FDFBF6;
  --bg-panel-hover: #FFFEF9;
  --bg-inset: #EBE5D8;
  --bg-deep: #E0D9CA;

  /* Accent colors — richer */
  --brown-dark: #4A3828;
  --brown-mid: #7A6248;
  --brown-light: #A89878;
  --green-leaf: #5A8249;
  --green-soft: #7CA06A;
  --green-pale: #C0D6AA;
  --terra: #C06840;
  --terra-soft: #D89468;
  --blue-sky: #6890B0;
  --blue-soft: #9ABCD6;
  --gold-warm: #C89830;
  --gold-pale: #E0C870;
  --pink-blossom: #C87888;
  --pink-soft: #E0A8B8;
  --purple-berry: #8868A0;

  /* Text — stronger hierarchy */
  --text-primary: #2A2018;
  --text-secondary: #685848;
  --text-dim: #9A8E7E;
  --text-accent: #4A3828;

  /* Borders */
  --border-main: #C8B898;
  --border-dark: #8A7A60;
  --border-accent: #4A3828;

  /* Fonts */
  --font-pixel: 'Press Start 2P', 'DotGothic16', monospace;
  --font-pixel-jp: 'DotGothic16', 'Press Start 2P', monospace;
  --font-body: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
  --font-serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;

  /* Pixel border thickness */
  --px: 3px;
}

/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; scroll-behavior: smooth; }
body {
  min-height: 100%;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.65;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-font-smoothing: antialiased;
}

/* === PAGE BACKGROUND TEXTURE === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 15% 25%, rgba(90,130,73,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(192,104,64,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(200,152,48,0.02) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle pixel grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(74,56,40,0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,56,40,0.01) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
  z-index: 0;
}

/* === PIXEL BORDER MIXIN (via box-shadow) === */
.pixel-border {
  border: var(--px) solid var(--border-main);
  box-shadow:
    var(--px) var(--px) 0 0 var(--border-dark),
    calc(var(--px) * -1) calc(var(--px) * -1) 0 0 var(--bg-panel);
}

/* === DASHBOARD GRID === */
.dashboard {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(240px, 1fr) 3fr;
  grid-template-rows: auto auto auto;
  grid-template-areas:
    "header header"
    "left main"
    "statusbar statusbar";
  min-height: 100vh;
  gap: 10px;
  padding: 10px 14px;
  max-width: 100%;
  margin: 0 auto;
}
/* Main area: nested grid for timeline / diary / feeds */
.main-area {
  grid-area: main;
  display: grid;
  grid-template-columns: minmax(420px, 2.2fr) minmax(280px, 1.2fr);
  grid-template-rows: auto auto;
  gap: 10px;
  align-self: start;
}
.center-column {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  max-height: calc(100vh - 100px);
  overflow: hidden;
}
.right-column {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  max-height: calc(100vh - 100px);
  overflow: hidden;
}

/* === HEADER === */
.header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  margin-bottom: 2px;
  background: var(--bg-panel);
  border: var(--px) solid var(--border-dark);
  box-shadow:
    var(--px) var(--px) 0 0 var(--brown-dark),
    inset 0 -1px 0 0 var(--bg-inset);
  position: relative;
}

/* Decorative corner pixels */
.header::before,
.header::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--green-leaf);
  transition: background 0.3s ease;
}
.header::before { top: -5px; left: -5px; }
.header::after { top: -5px; right: -5px; }

.header-title {
  font-family: var(--font-pixel);
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--brown-dark);
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-title .leaf {
  display: inline-block;
  width: 18px;
  height: 18px;
  background: var(--green-leaf);
  clip-path: polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%);
  animation: leafSway 6s ease-in-out infinite;
}
@keyframes leafSway {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(4deg); }
  75% { transform: rotate(-4deg); }
}
.header-tick {
  font-family: var(--font-pixel);
  font-size: 9px;
  color: var(--text-secondary);
  letter-spacing: 1px;
  opacity: 0.85;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
.day-select {
  height: 30px;
  min-width: 170px;
  border: 2px solid var(--border-main);
  background: var(--bg-inset);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 0 10px;
  cursor: pointer;
  transition: border-color 0.2s ease;
}
.day-select:focus { border-color: var(--green-leaf); outline: none; }

/* Replay CTA button — pulsing attention-grabber */
.replay-cta {
  height: 30px;
  padding: 0 14px;
  border: 2px solid var(--green-leaf);
  background: linear-gradient(135deg, var(--green-leaf), var(--green-soft));
  color: #fff;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.25s ease;
  animation: ctaPulse 2s ease-in-out infinite;
  white-space: nowrap;
  position: relative;
}
.replay-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(90, 130, 73, 0.4);
  animation: none;
  background: linear-gradient(135deg, var(--green-soft), var(--green-leaf));
}
.replay-cta:active {
  transform: translateY(0);
  box-shadow: none;
}
.replay-cta.is-playing {
  background: linear-gradient(135deg, var(--terra), var(--terra-soft));
  border-color: var(--terra);
  animation: none;
}
@keyframes ctaPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(90, 130, 73, 0.5); }
  50% { box-shadow: 0 0 0 6px rgba(90, 130, 73, 0); }
}

.day-reset {
  height: 30px;
  padding: 0 14px;
  border: 2px solid var(--border-main);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  transition: all 0.2s ease;
}
.day-reset:hover {
  border-color: var(--green-leaf);
  color: var(--green-leaf);
  background: rgba(90,130,73,0.05);
}

/* === PANELS === */
.panel {
  background: var(--bg-panel);
  padding: 14px;
  position: relative;
  border: var(--px) solid var(--border-main);
  box-shadow: var(--px) var(--px) 0 0 var(--border-dark);
  opacity: 0;
  animation: panelFadeIn 0.5s ease-out forwards;
  transition: box-shadow 0.3s ease, transform 0.2s ease;
}
.panel:hover {
  box-shadow:
    var(--px) var(--px) 0 0 var(--border-dark),
    0 6px 24px rgba(74,56,40,0.07);
  transform: translateY(-1px);
}

@keyframes panelFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.panel:nth-child(2) { animation-delay: 0.05s; }
.panel:nth-child(3) { animation-delay: 0.1s; }
.panel:nth-child(4) { animation-delay: 0.15s; }
.panel:nth-child(5) { animation-delay: 0.2s; }
.panel:nth-child(6) { animation-delay: 0.25s; }
.panel:nth-child(7) { animation-delay: 0.3s; }

/* Panel title — refined pixel tab */
.panel-title {
  font-family: var(--font-pixel-jp);
  font-size: 13px;
  color: var(--bg-panel);
  background: var(--brown-dark);
  display: inline-block;
  padding: 5px 18px 5px 12px;
  margin: -14px 0 12px -14px;
  position: relative;
  letter-spacing: 3px;
  line-height: 1.4;
  border-bottom: var(--px) solid var(--brown-dark);
}
/* Stepped pixel edge on right */
.panel-title::after {
  content: '';
  position: absolute;
  right: -12px;
  top: 0;
  width: 12px;
  height: 100%;
  background: var(--brown-dark);
  clip-path: polygon(0 0, 0 100%, 100% 100%);
}

/* === UPDATE FLASH === */
@keyframes updateGlow {
  0% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark), 0 0 0 0 rgba(107,143,94,0.3); }
  50% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark), 0 0 20px 4px rgba(107,143,94,0.15); }
  100% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark), 0 0 0 0 rgba(107,143,94,0); }
}
.panel-updated {
  animation: updateGlow 0.6s ease-out;
}

/* === GRID AREA ASSIGNMENTS === */
.left-column {
  grid-area: left;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.charcard {
  min-height: auto;
  margin: 0;
}
.timeline {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  margin: 0;
}
.schedule {
  min-height: auto;
  margin: 0;
}
.reality {
  margin: 0;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

/* === CHARACTER CARD === */
.charcard {
  text-align: center;
  overflow-y: auto;
}

.char-avatar {
  width: 80px;
  height: 80px;
  margin: 2px auto 10px auto;
  border: var(--px) solid var(--border-dark);
  box-shadow:
    var(--px) var(--px) 0 0 var(--brown-dark),
    0 0 0 4px rgba(90,130,73,0.08);
  overflow: hidden;
  background: var(--bg-inset);
  clip-path: polygon(
    20% 0%, 80% 0%, 100% 20%, 100% 80%,
    80% 100%, 20% 100%, 0% 80%, 0% 20%
  );
  transition: box-shadow 0.3s ease;
}
.charcard:hover .char-avatar {
  box-shadow:
    var(--px) var(--px) 0 0 var(--brown-dark),
    0 0 0 6px rgba(90,130,73,0.15);
}
.char-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: auto;
}

.char-name {
  font-family: var(--font-pixel-jp);
  font-size: 20px;
  color: var(--brown-dark);
  margin-bottom: 2px;
}
.char-name-sub {
  font-family: var(--font-pixel);
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* State badge — Stardew season tab style */
.state-badge {
  display: inline-block;
  padding: 3px 12px;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  letter-spacing: 2px;
  border: 2px solid;
  margin-bottom: 6px;
}
.state-badge-flow {
  background: var(--green-pale);
  color: var(--green-leaf);
  border-color: var(--green-leaf);
  animation: flowPulse 2.5s ease-in-out infinite;
}
.state-badge-drift {
  background: var(--bg-inset);
  color: var(--text-dim);
  border-color: var(--border-main);
}
.state-badge-normal {
  background: var(--blue-soft);
  color: var(--blue-sky);
  border-color: var(--blue-sky);
}
@keyframes flowPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(107,143,94,0); }
  50% { box-shadow: 0 0 12px 2px rgba(107,143,94,0.25); }
}

.flow-info {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

/* === STARDEW-STYLE STAT BARS === */
.bar-container {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 6px 0;
}
.bar-label {
  width: 38px;
  font-family: var(--font-pixel-jp);
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 14px;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  position: relative;
  overflow: hidden;
  image-rendering: pixelated;
}
.bar-fill {
  height: 100%;
  transition: width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
  position: relative;
  image-rendering: pixelated;
}
/* Pixel dither pattern on bar fill */
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.15) 2px,
      rgba(255,255,255,0.15) 4px
    );
}
.bar-value {
  width: 42px;
  text-align: right;
  font-family: var(--font-pixel);
  font-size: 9px;
  color: var(--text-primary);
  flex-shrink: 0;
}

.post-info {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 2px dashed var(--bg-inset);
}

.char-embed-block {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 2px dashed var(--bg-inset);
  text-align: left;
}
.char-embed-title {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--brown-dark);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.char-embed-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 14px;
  background: var(--green-leaf);
  flex-shrink: 0;
}
.char-embed-block .emotion-section {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  height: auto;
}
.char-embed-block .radar-container {
  width: 130px;
  height: 130px;
}
.char-embed-block .emotion-dims {
  grid-template-columns: 1fr;
  gap: 2px 0;
  margin-top: 8px;
}
.char-embed-block .emotion-mood {
  font-size: 13px;
  margin-bottom: 4px;
}
.char-embed-block .emotion-cause {
  font-size: 11px;
  margin-bottom: 6px;
}
.char-embed-block .radar-legend {
  margin-top: 6px;
  font-size: 10px;
  gap: 8px;
  flex-wrap: wrap;
}
.char-embed-block .intent-row {
  gap: 6px;
  margin: 4px 0;
  padding: 3px 6px;
}
.char-embed-block .intent-category {
  width: 42px;
  font-size: 10px;
  padding: 1px 3px;
}
.char-embed-block .intent-desc {
  padding-left: 0;
  white-space: normal;
  line-height: 1.35;
}

/* === FLOW STATE GLOW === */
.glow-flow {
  border-color: var(--green-leaf) !important;
  box-shadow: var(--px) var(--px) 0 0 var(--green-leaf), 0 0 16px rgba(107,143,94,0.15);
}
.glow-drift {
  border-color: var(--border-main) !important;
  box-shadow: var(--px) var(--px) 0 0 var(--border-main);
}

/* === ACTION TIMELINE === */
.tick-entry {
  padding: 10px 12px;
  margin: 6px 0;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  border-left: 5px solid var(--border-main);
  position: relative;
  transition: border-color 0.3s ease, background 0.3s ease, transform 0.15s ease;
}
.tick-entry:hover {
  transform: translateX(2px);
}
.tick-entry.current {
  border-left-color: var(--green-leaf);
  background: linear-gradient(90deg, rgba(90,130,73,0.07), var(--bg-inset) 50%);
}
.tick-entry.current::before {
  content: '▸';
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--green-leaf);
  font-size: 14px;
  font-weight: bold;
}
.tick-entry-enter {
  animation: tickSlideIn 0.3s ease-out forwards;
}
@keyframes tickSlideIn {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: translateX(0); }
}
.tick-time {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.tick-summary {
  font-family: var(--font-body);
  font-size: 13.5px;
  margin: 5px 0;
  color: var(--text-primary);
  font-weight: 500;
  line-height: 1.55;
}
.tick-monologue {
  font-family: var(--font-serif);
  font-size: 12.5px;
  color: var(--brown-mid);
  font-style: italic;
  padding-left: 12px;
  border-left: 3px solid var(--gold-pale);
  margin: 8px 0;
  line-height: 1.65;
}
.tick-actions {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tick-actions span {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-panel);
  border: 2px solid var(--border-main);
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--brown-mid);
  letter-spacing: 0.5px;
}

/* === INTENT ARENA === */
.intent-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
  padding: 5px 8px;
  transition: background 0.3s ease, transform 0.15s ease;
  border: 2px solid transparent;
}
.intent-row.actionable {
  background: rgba(107,143,94,0.06);
  border-color: var(--green-pale);
  transform: scale(1.01);
}
.intent-row.dormant {
  opacity: 0.4;
}
.intent-row.dormant .intent-category {
  color: var(--text-dim) !important;
  background: transparent !important;
  border-color: var(--bg-inset) !important;
}
.intent-category {
  width: 46px;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  text-align: center;
  padding: 2px 4px;
  border: 2px solid;
  flex-shrink: 0;
}
.intent-bar-track {
  flex: 1;
  height: 10px;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  position: relative;
  overflow: visible;
}
.intent-bar-fill {
  height: 100%;
  transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
}
.intent-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.12) 2px,
      rgba(255,255,255,0.12) 4px
    );
}
.intent-resistance-marker {
  position: absolute;
  top: -5px;
  height: 20px;
  width: 4px;
  transition: left 0.5s ease;
  background: var(--terra);
  border: 1px solid var(--brown-dark);
}
.intent-skip {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--terra);
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.intent-desc {
  font-size: 11px;
  color: var(--text-secondary);
  padding: 0 0 4px 54px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.intent-dormant-placeholder {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 6px;
  text-align: center;
  line-height: 10px;
}

/* === EMOTION RADAR === */
.emotion-section {
  display: flex;
  align-items: center;
  gap: 14px;
  height: calc(100% - 36px);
}
.radar-container {
  width: 180px;
  height: 180px;
  flex-shrink: 0;
  position: relative;
}
.radar-container svg { width: 100%; height: 100%; }
.emotion-info { flex: 1; min-width: 0; }

.emotion-mood {
  font-family: var(--font-pixel-jp);
  font-size: 14px;
  color: var(--brown-dark);
  margin-bottom: 4px;
}
.emotion-cause {
  font-family: var(--font-serif);
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  line-height: 1.55;
}
.stress-warning {
  color: var(--terra);
  font-family: var(--font-pixel-jp);
  font-size: 12px;
  letter-spacing: 2px;
  animation: stressBlink 1.2s step-end infinite;
  padding: 6px 12px;
  background: rgba(193,120,80,0.1);
  border: 2px solid var(--terra);
  display: inline-block;
}
@keyframes stressBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.radar-legend {
  margin-top: 14px;
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 14px;
}
.radar-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.radar-legend-dot {
  width: 8px;
  height: 8px;
  border: 1px solid var(--border-main);
}
.emotion-dims {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 16px;
  margin-top: 12px;
  font-size: 12px;
}
.emotion-dim-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.emotion-dim-label {
  color: var(--text-dim);
  width: 36px;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
}
.emotion-dim-value {
  color: var(--text-primary);
  font-family: var(--font-pixel);
  font-size: 9px;
  font-weight: 400;
}

/* === SCHEDULE (TIMETABLE / 课表) === */
.gantt-container {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.gantt-legend {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-secondary);
}
.legend-chip {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 2px solid;
}
/* The timetable grid: hours | rigid col | flex col */
.tt-grid {
  display: grid;
  grid-template-columns: 36px 1fr 1fr;
  border: 2px solid var(--border-main);
  background: var(--bg-inset);
  position: relative;
}
/* Column headers */
.tt-col-header {
  font-family: var(--font-pixel-jp);
  font-size: 10px;
  letter-spacing: 1px;
  text-align: center;
  padding: 4px 0;
  border-bottom: 2px solid var(--border-main);
}
.tt-col-header-time {
  background: rgba(92,74,58,0.04);
  color: var(--text-dim);
}
.tt-col-header-rigid {
  background: rgba(123,163,199,0.08);
  color: var(--blue-sky);
  border-left: 2px solid var(--border-main);
}
.tt-col-header-flex {
  background: rgba(107,143,94,0.08);
  color: var(--green-leaf);
  border-left: 2px solid var(--border-main);
}
/* Hour rows — fixed height per hour */
.tt-hour-label {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  text-align: right;
  padding: 2px 4px 0 0;
  border-top: 1px solid rgba(92,74,58,0.10);
  box-sizing: border-box;
  line-height: 1;
}
.tt-hour-label:first-of-type {
  border-top: none;
}
.tt-cell {
  border-top: 1px dashed rgba(92,74,58,0.10);
  border-left: 2px solid var(--border-main);
  position: relative;
  box-sizing: border-box;
}
.tt-cell:nth-of-type(3n+2) { /* first data col in each row */ }
.tt-cell-first-row {
  border-top: none;
}
/* Event blocks — absolute within cell stack */
.tt-block {
  position: absolute;
  left: 3px;
  right: 3px;
  font-family: var(--font-pixel-jp);
  font-size: 10px;
  line-height: 1.3;
  padding: 3px 5px;
  border: 2px solid;
  box-sizing: border-box;
  word-break: break-word;
  overflow: visible;
  z-index: 5;
}
.tt-block.gantt-rigid {
  background: var(--blue-soft);
  color: var(--blue-sky);
  border-color: var(--blue-sky);
}
.tt-block.gantt-flex {
  background: var(--green-pale);
  color: var(--green-leaf);
  border-color: var(--green-leaf);
}
.tt-block-time {
  font-family: var(--font-pixel);
  font-size: 7px;
  opacity: 0.7;
  display: block;
  margin-bottom: 1px;
}
/* Now marker */
.gantt-now-marker {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--terra);
  z-index: 12;
  pointer-events: none;
}
.gantt-now-marker::before {
  content: '';
  position: absolute;
  left: -6px;
  top: -4px;
  width: 6px;
  height: 10px;
  background: var(--terra);
  clip-path: polygon(100% 0, 0 50%, 100% 100%);
}
.schedule-hint {
  font-size: 11px;
  color: var(--text-dim);
  border: 2px dashed var(--border-main);
  background: var(--bg-inset);
  padding: 8px;
}
.schedule-empty {
  border: 2px dashed var(--border-main);
  background: var(--bg-inset);
  padding: 10px 8px;
  color: var(--text-dim);
  font-size: 11px;
  font-style: italic;
}

/* === TRAVEL CARD === */
.travelcard {
  min-height: 80px;
  margin: 0;
}
.travel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.travel-city {
  font-family: var(--font-pixel-jp);
  font-size: 16px;
  color: var(--brown-dark);
  letter-spacing: 1px;
}
.travel-country {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.travel-phase-badge {
  display: inline-block;
  padding: 2px 10px;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  letter-spacing: 1px;
  border: 2px solid;
}
.travel-phase-arriving {
  background: rgba(123,163,199,0.15);
  color: var(--blue-sky);
  border-color: var(--blue-sky);
}
.travel-phase-exploring {
  background: rgba(107,143,94,0.15);
  color: var(--green-leaf);
  border-color: var(--green-leaf);
}
.travel-phase-shooting {
  background: rgba(212,168,71,0.15);
  color: var(--gold-warm);
  border-color: var(--gold-warm);
}
.travel-phase-departing {
  background: rgba(193,120,80,0.12);
  color: var(--terra);
  border-color: var(--terra);
}
.travel-meta {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.travel-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.travel-meta-icon {
  font-size: 13px;
  line-height: 1;
}
.travel-spots-title {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  color: var(--brown-dark);
  letter-spacing: 1px;
  margin: 8px 0 6px;
  padding-top: 8px;
  border-top: 2px dashed var(--bg-inset);
}
.travel-spot {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  margin: 4px 0;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  transition: border-color 0.2s ease;
}
.travel-spot:hover {
  border-color: var(--terra-soft);
}
.travel-spot-visited {
  opacity: 0.5;
  border-style: dashed;
}
.travel-spot-check {
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 1px;
}
.travel-spot-info {
  flex: 1;
  min-width: 0;
}
.travel-spot-name {
  font-weight: 700;
  font-size: 12px;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.travel-spot-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.travel-spot-time {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  margin-top: 3px;
  letter-spacing: 0.3px;
}
.travel-spot-tags {
  display: flex;
  gap: 4px;
  margin-top: 3px;
}
.travel-spot-tag {
  display: inline-block;
  padding: 1px 5px;
  font-size: 9px;
  border: 1px solid var(--border-main);
  color: var(--text-dim);
  background: var(--bg-panel);
}

/* === PHOTO CARD === */
.photocard {
  min-height: 100px;
  margin: 0;
  display: flex;
  flex-direction: column;
}
.photo-preview-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 75%;
  overflow: hidden;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  cursor: pointer;
  transition: border-color 0.3s ease;
}
.photo-preview-wrap:hover {
  border-color: var(--pink-blossom);
}
.photo-preview-wrap:hover .photo-preview-img {
  transform: scale(1.05);
}
.photo-preview-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  image-rendering: auto;
}
/* Film grain overlay */
.photo-preview-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(92,74,58,0.018) 2px,
      rgba(92,74,58,0.018) 4px
    );
  pointer-events: none;
  z-index: 1;
}
.photo-preview-film {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 6px 8px;
  background: linear-gradient(to top, rgba(44,36,28,0.55), transparent);
  z-index: 2;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  pointer-events: none;
}
.photo-preview-name {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 70%;
}
.photo-preview-date {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.5px;
}
.photo-preview-skeleton {
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, var(--bg-inset) 30%, var(--bg-deep) 50%, var(--bg-inset) 70%);
  background-size: 200% 100%;
  animation: photoSkeletonShimmer 1.5s ease-in-out infinite;
}
@keyframes photoSkeletonShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.photo-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
}
.photo-count-chip {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.photo-album-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--pink-blossom);
  background: var(--bg-panel);
  border: 2px solid var(--pink-blossom);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
}
.photo-album-btn:hover {
  background: var(--pink-blossom);
  color: var(--bg-panel);
  box-shadow: var(--px) var(--px) 0 0 var(--brown-dark);
}
.photo-album-btn svg {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}
.photo-empty-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100px;
  border: 2px dashed var(--border-main);
  background: var(--bg-inset);
  color: var(--text-dim);
  gap: 4px;
}
.photo-empty-icon {
  font-size: 20px;
  opacity: 0.5;
  line-height: 1;
}
.photo-empty-text {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  letter-spacing: 1px;
}

/* === FEED PANEL === */
.feeds-row {
  grid-column: 1 / -1;
  align-self: start;
}
.feed {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  min-height: 0;
}
.reality .feed {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.feed-section {
  background: var(--bg-panel);
  padding: 10px;
  display: flex;
  flex-direction: column;
  border: 2px solid var(--border-main);
  box-shadow: 2px 2px 0 0 var(--bg-deep);
  min-height: 0;
  flex: 1;
  transition: box-shadow 0.2s ease;
}
.feed-section:hover {
  box-shadow: 2px 2px 0 0 var(--bg-deep), 0 2px 12px rgba(74,56,40,0.06);
}
.feed-title {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  color: var(--brown-dark);
  letter-spacing: 1px;
  margin-bottom: 10px;
  flex-shrink: 0;
  padding-bottom: 8px;
  border-bottom: 2px dashed var(--bg-deep);
}
.feed-scroll {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1;
  min-height: 0;
}
.feed-card {
  width: 100%;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  padding: 10px;
  font-size: 11px;
  color: var(--text-secondary);
  transition: background 0.2s ease;
}
.feed-card:hover {
  background: var(--bg-deep);
}
.feed-card-thumb {
  width: 100%;
  height: auto;
  max-height: 360px;
  object-fit: contain;
  margin-bottom: 6px;
  background: var(--bg-deep);
  border: 1px solid var(--border-main);
  border-radius: 4px;
}
.post-images-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 4px;
  margin-bottom: 6px;
}
.post-images-grid img {
  width: 100%;
  height: auto;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--bg-deep);
  border: 1px solid var(--border-main);
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.post-images-grid img:hover {
  transform: scale(1.03);
}
.post-images-grid.single-image {
  grid-template-columns: 1fr;
}
.post-images-grid.single-image img {
  aspect-ratio: auto;
  max-height: 360px;
  object-fit: contain;
}
.feed-card-title {
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 3px;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.feed-card-meta {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.feed-card-body {
  color: var(--text-secondary);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.feed-card-tags {
  font-size: 10px;
  color: var(--blue-sky);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.feed-empty {
  color: var(--text-dim);
  font-style: italic;
  font-size: 12px;
  padding: 16px 0;
  text-align: center;
}
.feed-source-chip {
  display: inline-block;
  margin-bottom: 4px;
  padding: 1px 6px;
  font-size: 10px;
  border: 1px solid var(--border-main);
  color: var(--purple-berry);
  background: rgba(152, 120, 168, 0.08);
}

/* === STATUS BAR === */
.statusbar {
  grid-area: statusbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  margin-top: 2px;
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--text-dim);
  background: var(--bg-panel);
  border: 2px solid var(--border-main);
  letter-spacing: 1px;
}
.statusbar-chat {
  color: var(--green-leaf);
}
.statusbar-error {
  color: var(--terra);
  animation: stressBlink 1.2s step-end infinite;
}

/* === SCROLLBAR (pixel-friendly) === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-inset); }
::-webkit-scrollbar-thumb {
  background: var(--border-main);
  border: 1px solid var(--border-dark);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--brown-mid);
}

/* === EMPTY / NO DATA === */
.empty-state {
  color: var(--text-dim);
  font-style: italic;
  font-size: 12px;
  padding: 12px 0;
}
.no-data {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 64px;
  color: var(--text-dim);
  font-family: var(--font-pixel-jp);
  font-size: 12px;
  border: 2px dashed var(--border-main);
  background: var(--bg-inset);
  letter-spacing: 2px;
}

/* === DIARY PANEL === */
.reality {
  overflow-y: hidden;
  flex: 1;
  min-height: 0;
}
#feedDiary {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}
.reality .feed-scroll {
  flex: 1;
  min-height: 0;
  max-height: none;
}
.feeds-row .feed-scroll {
  max-height: 300px;
}
.diary-entry {
  padding: 10px;
  margin: 6px 0;
  background: var(--bg-inset);
  border: 2px solid var(--border-main);
  border-left: 5px solid var(--gold-warm);
  transition: background 0.2s ease;
}
.diary-entry:hover {
  background: var(--bg-deep);
}
.diary-entry-header {
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  color: var(--brown-dark);
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.diary-entry-body {
  font-family: var(--font-serif);
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

/* === RESPONSIVE === */
@media (max-width: 1280px) {
  .dashboard {
    grid-template-columns: minmax(220px, 1fr) 3fr;
    gap: 8px;
    padding: 8px 10px;
  }
  .main-area {
    grid-template-columns: 2fr 1fr;
  }
}
@media (max-width: 1080px) {
  .dashboard {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    grid-template-areas:
      "header"
      "left"
      "main"
      "statusbar";
    padding: 12px;
    gap: 12px;
  }
  .main-area {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .center-column,
  .right-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: auto;
    max-height: none;
    overflow: visible;
  }
  .timeline,
  .reality {
    min-height: auto;
    flex: none;
    overflow-y: visible;
  }
  .feed {
    grid-template-columns: 1fr;
  }
}
@media (max-width: 900px) {
  .char-embed-block .emotion-section { flex-direction: column; }
  .char-embed-block .radar-container { width: 180px; height: 180px; }
  .header {
    flex-wrap: wrap;
    gap: 8px;
    justify-content: space-between;
  }
}

/* ============================================
   PLAYBACK ENGINE — CONTROL BAR
   ============================================ */
.playback-bar {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg-panel);
  border: var(--px) solid var(--border-main);
  box-shadow: var(--px) var(--px) 0 0 var(--border-dark);
  margin-bottom: 2px;
}
.playback-bar.active { display: flex; }
.playback-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.pb-btn {
  height: 28px;
  padding: 0 12px;
  border: 2px solid var(--border-main);
  background: var(--bg-inset);
  color: var(--text-secondary);
  font-family: var(--font-pixel-jp);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 1px;
}
.pb-btn:hover { border-color: var(--green-leaf); color: var(--green-leaf); }
.pb-btn.active { border-color: var(--green-leaf); color: var(--bg-panel); background: var(--green-leaf); }
.pb-speed-group { display: flex; gap: 2px; }
.pb-speed {
  height: 24px;
  padding: 0 8px;
  border: 2px solid var(--border-main);
  background: var(--bg-inset);
  color: var(--text-dim);
  font-family: var(--font-pixel);
  font-size: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.pb-speed.active { border-color: var(--terra); color: var(--bg-panel); background: var(--terra); }
.pb-speed:hover:not(.active) { border-color: var(--terra-soft); color: var(--terra); }
.pb-time { font-family: var(--font-pixel); font-size: 10px; color: var(--text-primary); letter-spacing: 1px; min-width: 60px; }
.pb-counter { font-family: var(--font-pixel); font-size: 8px; color: var(--text-dim); letter-spacing: 0.5px; }
.pb-timeline { position: relative; height: 28px; display: flex; align-items: center; gap: 6px; }
.pb-tl-label { font-family: var(--font-pixel); font-size: 7px; color: var(--text-dim); flex-shrink: 0; width: 36px; text-align: center; }
.pb-slider-wrap { flex: 1; position: relative; height: 20px; display: flex; align-items: center; }
.pb-slider {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--bg-inset);
  border: 1px solid var(--border-main);
  outline: none;
  cursor: pointer;
}
.pb-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--terra); border: 2px solid var(--brown-dark); cursor: grab; }
.pb-slider::-moz-range-thumb { width: 14px; height: 14px; background: var(--terra); border: 2px solid var(--brown-dark); cursor: grab; }
.pb-markers { position: absolute; left: 0; right: 0; top: 50%; height: 0; pointer-events: none; }
.pb-marker {
  position: absolute;
  width: 0; height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-bottom: 6px solid var(--gold-warm);
  transform: translate(-50%, 6px);
  pointer-events: all;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.pb-marker:hover { opacity: 1; }
.pb-marker.emotion { border-bottom-color: var(--terra); }
.pb-marker.flow { border-bottom-color: var(--green-leaf); }
.pb-marker.post { border-bottom-color: var(--pink-blossom); }
.pb-marker.chat { border-bottom-color: var(--blue-sky); }
.pb-marker.energy { border-bottom-color: var(--gold-warm); }

/* ============================================
   BREATHING ANIMATIONS
   ============================================ */
@keyframes avatarBreathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.015)} }
@keyframes avatarBreatheFast { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
@keyframes avatarBreatheSlow { 0%,100%{transform:scale(1)} 50%{transform:scale(1.008)} }
@keyframes avatarDrift { 0%,100%{transform:rotate(0)} 25%{transform:rotate(1.5deg)} 75%{transform:rotate(-1.5deg)} }
@keyframes flowGlow { 0%,100%{box-shadow:var(--px) var(--px) 0 0 var(--brown-dark),0 0 0 4px rgba(90,130,73,.08)} 50%{box-shadow:var(--px) var(--px) 0 0 var(--brown-dark),0 0 12px 6px rgba(200,168,48,.2)} }
.char-avatar.breathing { animation: avatarBreathe 4s ease-in-out infinite; }
.char-avatar.breathing-fast { animation: avatarBreatheFast 2.5s ease-in-out infinite; }
.char-avatar.breathing-slow { animation: avatarBreatheSlow 6s ease-in-out infinite; }
.char-avatar.drifting { animation: avatarDrift 8s ease-in-out infinite; }
.char-avatar.flow-glow { animation: flowGlow 3s ease-in-out infinite; }

/* Bar micro-tremor */
@keyframes barTremor { 0%{transform:scaleX(1)} 25%{transform:scaleX(1.003)} 50%{transform:scaleX(.997)} 75%{transform:scaleX(1.002)} 100%{transform:scaleX(1)} }
.bar-fill.alive { animation: barTremor 2s ease-in-out infinite; transition: width 1.2s ease-out, background 2s ease; }
@keyframes impulseDanger { 0%,100%{opacity:1} 50%{opacity:.75} }
.bar-fill.impulse-danger { animation: barTremor 2s ease-in-out infinite, impulseDanger 1.2s ease-in-out infinite; }

/* Timeline playback animations */
@keyframes pbSlideIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.tick-entry.pb-enter { animation: pbSlideIn 0.6s ease-out forwards; }
.tick-entry.pb-past { opacity: 0.7; filter: brightness(0.9); transition: opacity 0.5s, filter 0.5s; }
@keyframes tagBounce { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
.tick-actions span.bouncing { animation: tagBounce 0.4s ease-out forwards; }

/* Schedule active pulse */
@keyframes schedActivePulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px 2px rgba(90,130,73,.2)} }
.tt-block.sched-active { animation: schedActivePulse 2.5s ease-in-out infinite; }
.tt-block.sched-past { filter: saturate(0.3); opacity: 0.6; transition: filter 1s, opacity 1s; }

/* === PLAYBACK ENHANCEMENT ANIMATIONS === */

/* Intent bar smooth transitions in playback */
.intent-bar-fill { transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
@keyframes intentPulse { 0%,100%{opacity:0.65} 50%{opacity:0.85} }
.intent-bar-fill.pulsing { animation: intentPulse 2s ease-in-out infinite; }

/* Intent row fade in/out */
@keyframes intentFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.intent-row.pb-enter { animation: intentFadeIn 0.5s ease-out forwards; }
.intent-row.pb-exit { opacity: 0; transform: translateY(-6px); transition: opacity 0.3s, transform 0.3s; }

/* Number value rolling animation helper */
.val-rolling { transition: none; }

/* Feed/Diary unlock animation */
@keyframes feedUnlock { from{opacity:0;transform:translateY(8px);filter:blur(2px)} to{opacity:1;transform:translateY(0);filter:blur(0)} }
.feed-card.pb-unlocked, .diary-entry.pb-unlocked { animation: feedUnlock 0.6s ease-out forwards; }
.feed-card.pb-locked, .diary-entry.pb-locked { display: none !important; }

/* Gantt now-marker playback transition */
.gantt-now-marker { transition: top 0.8s ease-in-out; }

/* Panel pulse — stronger variant for playback changes */
@keyframes panelPulseGlow {
  0% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark); }
  30% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark), 0 0 16px 3px rgba(200,168,48,0.2); }
  100% { box-shadow: var(--px) var(--px) 0 0 var(--border-dark), 0 0 0 0 rgba(200,168,48,0); }
}
.panel-pulse { animation: panelPulseGlow 0.8s ease-out; }

/* Radar SVG polygon transitions (applied via JS) */
#radarSvg polygon { transition: none; }
#radarSvg .radar-data-poly { pointer-events: none; }

/* Timeline playback — enhanced current glow */
.tick-entry.pb-current { 
  border-left-color: var(--green-leaf) !important; 
  background: rgba(90,130,73,0.04) !important;
  transition: background 0.5s, border-left-color 0.3s;
}

/* ============================================
   AMBIENT ATMOSPHERE (time-of-day)
   ============================================ */
body.ambient-dawn { --ambient-overlay: rgba(180,140,200,0.04); filter: brightness(0.92); }
body.ambient-morning { --ambient-overlay: none; filter: none; }
body.ambient-noon { --ambient-overlay: rgba(200,180,100,0.03); filter: brightness(1.01) saturate(1.02); }
body.ambient-afternoon { --ambient-overlay: rgba(210,160,100,0.04); filter: brightness(0.98) saturate(1.05); }
body.ambient-evening { --ambient-overlay: rgba(160,120,60,0.06); filter: brightness(0.90) saturate(0.95); }
body.ambient-night { --ambient-overlay: rgba(40,50,90,0.08); filter: brightness(0.82) saturate(0.85); }
body[class*="ambient-"] { transition: filter 3s ease; }

/* ============================================
   THOUGHT BUBBLE
   ============================================ */
.thought-bubble {
  position: relative;
  background: var(--bg-panel);
  border: 2px solid var(--border-main);
  border-radius: 14px;
  padding: 8px 14px;
  margin: 8px 0;
  font-family: var(--font-serif);
  font-size: 12.5px;
  color: var(--brown-mid);
  font-style: italic;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.5s ease, transform 0.5s ease, background 0.8s ease;
  min-height: 24px;
  box-shadow: 0 2px 8px rgba(74,56,40,0.06);
}
.thought-bubble.visible { opacity: 1; transform: translateY(0); }
.thought-bubble::before,
.thought-bubble::after {
  content: '';
  position: absolute;
  background: var(--bg-panel);
  border: 2px solid var(--border-main);
  border-radius: 50%;
}
.thought-bubble::before { width: 10px; height: 10px; bottom: -14px; left: 24px; }
.thought-bubble::after { width: 6px; height: 6px; bottom: -22px; left: 18px; }
.thought-bubble.mood-happy { background: rgba(232,210,160,0.15); }
.thought-bubble.mood-anxious { background: rgba(180,190,210,0.12); }
.thought-bubble.mood-excited { background: rgba(210,180,220,0.12); }

/* ============================================
   EVENT TOAST (Light Danmaku)
   ============================================ */
.event-toast-container {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
  max-width: 500px;
}
@keyframes toastIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }
.event-toast {
  padding: 8px 18px;
  background: var(--bg-panel);
  border: 2px solid var(--border-main);
  box-shadow: 0 4px 16px rgba(74,56,40,0.12);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.4s ease-out;
  pointer-events: auto;
}
.event-toast.leaving { animation: toastOut 0.3s ease-in forwards; }
.event-toast-icon { font-size: 16px; flex-shrink: 0; }
.event-toast.flow-enter { border-left: 4px solid var(--green-leaf); }
.event-toast.flow-exit { border-left: 4px solid var(--text-dim); }
.event-toast.post-event { border-left: 4px solid var(--pink-blossom); }
.event-toast.chat-event { border-left: 4px solid var(--blue-sky); }
.event-toast.drift-event { border-left: 4px solid var(--brown-light); }

/* Flow enter: subtle golden full-screen flash */
@keyframes flowFlash { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
.flow-flash-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(200,168,48,0.08), transparent 70%);
  pointer-events: none;
  z-index: 999;
  animation: flowFlash 0.8s ease-out forwards;
}

/* Drift: subtle gray wash */
@keyframes driftWash { 0%{opacity:0} 50%{opacity:1} 100%{opacity:0} }
.drift-wash-overlay {
  position: fixed;
  inset: 0;
  background: rgba(160,150,130,0.06);
  pointer-events: none;
  z-index: 999;
  animation: driftWash 1.5s ease-in-out forwards;
}

/* ============================================
   ENHANCED STATUS BAR (Narrative Mode)
   ============================================ */
.statusbar.narrative {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
}
.sb-left { display: flex; align-items: center; gap: 8px; }
.sb-time { font-family: var(--font-pixel); font-size: 9px; color: var(--text-primary); }
.sb-flow-badge {
  font-family: var(--font-pixel-jp);
  font-size: 10px;
  padding: 1px 8px;
  border: 2px solid var(--green-leaf);
  color: var(--green-leaf);
  background: rgba(90,130,73,0.08);
}
.sb-center {
  font-family: var(--font-serif);

  font-style: italic;

}
.sb-right { display: flex; align-items: center; gap: 10px; }
.sb-progress-wrap {

}
.sb-progress-track {
  width: 80px;

  background: var(--bg-inset);
  border: 1px solid var(--border-main);
}
.sb-progress-fill {
  height: 100%;
  background: var(--green-leaf);
  transition: width 0.5s ease;
}
</style>
</head>

<script>
// === STATE & POLLING ===
var lastStateRaw = null;
var POLL_INTERVAL = 30000;
var previousTickCount = 0;
var selectedDate = new Date().toISOString().slice(0, 10); // 默认显示当天
var dateControlReady = false;
var currentPersona = '';

function switchPersona(slug) {
  if (!slug) return;
  currentPersona = slug;
  var nameEl = document.getElementById('charNameSub');
  if (nameEl) nameEl.textContent = slug.toUpperCase();
  var avatarImg = document.getElementById('charAvatarImg');
  if (avatarImg) avatarImg.src = '/api/avatar?persona=' + encodeURIComponent(slug);
  document.title = slug.toUpperCase() + ' — Alive Dashboard';
  lastStateRaw = null;
  latestPhotoRaw = null;
  poll();
  fetchLatestPhoto();
}

async function initPersonaSelector() {
  try {
    var res = await fetch('/api/personas');
    if (!res.ok) return;
    var data = await res.json();
    var personas = data.personas || [];
    var active = data.active || personas[0] || '';
    var selector = document.getElementById('persona-selector');
    if (!selector) return;
    selector.innerHTML = personas.map(function(p) {
      return '<option value="' + p + '"' + (p === active ? ' selected' : '') + '>' + p + '</option>';
    }).join('');
    if (active) {
      currentPersona = active;
      var nameEl = document.getElementById('charNameSub');
      if (nameEl) nameEl.textContent = active.toUpperCase();
      var avatarImg = document.getElementById('charAvatarImg');
      if (avatarImg) avatarImg.src = '/api/avatar?persona=' + encodeURIComponent(active);
    }
  } catch (e) {
    // Silently fail — selector is non-critical
  }
}

async function poll() {
  try {
    var url = '/api/state';
    var params = [];
    if (currentPersona) params.push('persona=' + encodeURIComponent(currentPersona));
    if (selectedDate) params.push('date=' + encodeURIComponent(selectedDate));
    if (params.length > 0) url += '?' + params.join('&');
    var res = await fetch(url);
    if (!res.ok) {
      var err = await res.json().catch(function() { return { error: '服务器错误' }; });
      showError(err.error);
      return;
    }
    var data = await res.json();
    var raw = JSON.stringify(data);
    var syncEl = document.getElementById('statusRefresh');
    if (syncEl) {
      syncEl.textContent = 'LAST SYNC ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      syncEl.className = '';
    }
    if (raw !== lastStateRaw) {
      lastStateRaw = raw;
      render(data);
    }
  } catch (e) {
    showError('CONNECTION LOST');
  }
}

function showError(msg) {
  var el = document.getElementById('statusRefresh');
  if (!el) return; // statusbar might be in narrative mode
  el.textContent = msg;
  el.className = 'statusbar-error';
}

function toDateKey(value) {
  if (!value) return null;
  var direct = String(value).match(/\b\d{4}-\d{2}-\d{2}\b/);
  if (direct) return direct[0];
  var d = new Date(value);
  if (Number.isNaN(d.getTime())) return null;
  return d.toISOString().slice(0, 10);
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function ensureDateControl() {
  if (dateControlReady) return;
  var select = document.getElementById('daySelect');
  var resetBtn = document.getElementById('dayReset');
  if (!select || !resetBtn) return;

  select.addEventListener('change', function() {
    selectedDate = select.value || '';
    lastStateRaw = null;
    latestPhotoRaw = null;
    poll();
    fetchLatestPhoto();
  });

  resetBtn.addEventListener('click', function() {
    selectedDate = '';
    select.value = '';
    lastStateRaw = null;
    latestPhotoRaw = null;
    poll();
    fetchLatestPhoto();
  });

  dateControlReady = true;
}

function collectDates(data) {
  var set = new Set();

  (data.heartbeatLog || []).forEach(function(log) {
    var day = log.date || toDateKey(log.timestamp);
    if (day) set.add(day);
  });

  (data.postHistory || []).forEach(function(post) {
    var day = post.date || toDateKey(post.posted_at || post.timestamp);
    if (day) set.add(day);
  });

  (data.diaryEntries || []).forEach(function(entry) {
    var day = entry.date || toDateKey(entry.header);
    if (day) set.add(day);
  });

  (data.searchFeed || []).forEach(function(entry) {
    var day = entry.date || toDateKey(entry.timestamp || entry.query);
    if (day) set.add(day);
  });

  (data.insCommentFeed || []).forEach(function(item) {
    var day = item.date || toDateKey(item.timestamp || item.detail);
    if (day) set.add(day);
  });

  if (data.inspiration && data.inspiration.xiaohongshu_trends) {
    var xhsDay = toDateKey(data.inspiration.xiaohongshu_trends.updated_at);
    if (xhsDay) set.add(xhsDay);
  }

  set.add(todayKey());
  return Array.from(set).sort().reverse();
}

function refreshDateOptions(data) {
  var select = document.getElementById('daySelect');
  if (!select) return;

  var dates = collectDates(data);
  if (selectedDate && dates.indexOf(selectedDate) === -1) selectedDate = '';

  var html = '<option value="">全部日期</option>';
  dates.forEach(function(day) {
    var display = day + (day === todayKey() ? '（今天）' : '');
    html += '<option value="' + escAttr(day) + '">' + escHtml(display) + '</option>';
  });
  select.innerHTML = html;
  select.value = selectedDate;
}

function applyDateFilter(data) {
  if (!selectedDate) return data;

  function sameDay(itemDay) {
    return itemDay === selectedDate;
  }

  var filteredSchedule = data.schedule;
  if (selectedDate !== todayKey()) {
    filteredSchedule = {
      date: selectedDate,
      rigid: [],
      flexible: [],
      historical_notice: '历史日期暂无日程快照，仅展示轨迹/日记/刷帖内容。',
    };
  }

  return {
    timestamp: data.timestamp,
    emotion: data.emotion,
    intents: data.intents,
    vitality: data.vitality,
    confidence: data.confidence,
    flow: data.flow,
    postImpulse: data.postImpulse,
    schedule: filteredSchedule,
    activeSession: data.activeSession,
    inspiration: data.inspiration,
    heartbeatLog: (data.heartbeatLog || []).filter(function(log) {
      return sameDay(log.date || toDateKey(log.timestamp));
    }),
    postHistory: (data.postHistory || []).filter(function(post) {
      return sameDay(post.date || toDateKey(post.posted_at || post.timestamp));
    }),
    diaryEntries: (data.diaryEntries || []).filter(function(entry) {
      return sameDay(entry.date || toDateKey(entry.header));
    }),
    searchFeed: (data.searchFeed || []).filter(function(item) {
      return sameDay(item.date || toDateKey(item.timestamp || item.query));
    }),
    insCommentFeed: (data.insCommentFeed || []).filter(function(item) {
      return sameDay(item.date || toDateKey(item.timestamp || item.detail));
    }),
    redditTrends: (data.redditTrends || []).filter(function(item) {
      return sameDay(item.date);
    }),
  };
}

// === COLOR HELPERS ===
function barColor(ratio, baseColor) {
  if (ratio > 0.6) return baseColor || 'var(--green-leaf)';
  if (ratio > 0.3) return 'var(--gold-warm)';
  return 'var(--terra)';
}

// === RENDER ===
function render(data) {
  ensureDateControl();
  refreshDateOptions(data);
  // When selectedDate is set, backend already filters; skip client-side filter
  var filtered = selectedDate ? data : applyDateFilter(data);

  renderHeader(filtered);
  renderCharCard(filtered);
  renderTimeline(filtered);
  renderIntentArena(filtered);
  renderEmotionRadar(filtered);
  renderScheduleGantt(filtered);
  renderTravel(filtered);
  renderFeed(filtered);
  renderStatusBar(filtered);
}

  // Confidence (0.5-1.5 mapped to 0-100%)

  document.getElementById('barConfidence').style.width = confPct + '%';
  document.getElementById('barConfidence').style.background = barColor(confPct / 100, 'var(--blue-sky)');
  if (window._playbackMode) {

  } else {
    document.getElementById('valConfidence').textContent = conf.toFixed(2) + 'x';

  document.getElementById('barPostImpulse').style.width = impulse + '%';
