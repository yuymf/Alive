  if (window._playbackMode) {
    NumberAnimator.animate('valPostImpulse', Math.round(impulse), 400);
  } else {
    document.getElementById('valPostImpulse').textContent = Math.round(impulse);
  }

  // Post info
  if (data.postImpulse) {
    document.getElementById('postInfo').textContent = '今日 ' + data.postImpulse.posts_today + '/3 投稿';
  }
}

// --- [B] Action Timeline ---
function extractLogText(log) {
  var parts = [];
  if (log && log.tick_summary) parts.push(log.tick_summary);
  if (log && Array.isArray(log.chosen_actions) && log.chosen_actions.length > 0) {
    parts.push(log.chosen_actions.join('，'));
  }
  if (log && log.inner_monologue) parts.push(log.inner_monologue);
  return parts.join(' ').trim();
}

function normalizeTimelineSummary(log) {
  var summary = (log && log.tick_summary) || '';
  if (summary) return summary;
  if (log && Array.isArray(log.chosen_actions) && log.chosen_actions.length > 0) {
    return log.chosen_actions[0];
  }
  if (log && log.perception_summary) return log.perception_summary;
  if (log && log.type) return '心跳事件：' + log.type;
  return '';
}

function normalizeTimelineText(text) {
  return String(text || '')
    .toLowerCase()
    .replace(/[\s，。、“”"'！？!,.、:：;；()（）\[\]【】\-—_]+/g, '')
    .trim();
}

function timelineTextLooksSame(a, b) {
  var aa = normalizeTimelineText(a);
  var bb = normalizeTimelineText(b);
  if (!aa || !bb) return false;
  if (aa === bb) return true;
  if (aa.length >= 12 && bb.includes(aa)) return true;
  if (bb.length >= 12 && aa.includes(bb)) return true;
  return false;
}

function buildTimelineDisplay(log) {
  var summary = String(normalizeTimelineSummary(log) || '').trim();
  var monologue = String((log && log.inner_monologue) || '').trim();

  var actions = [];
  if (log && Array.isArray(log.chosen_actions)) {
    actions = log.chosen_actions
      .map(function(a) { return String(a || '').trim(); })
      .filter(Boolean)
      .filter(function(action, idx, arr) {
        return arr.findIndex(function(x) { return timelineTextLooksSame(x, action); }) === idx;
      });
  }

  if (timelineTextLooksSame(monologue, summary)) monologue = '';

  actions = actions.filter(function(action) {
    if (timelineTextLooksSame(action, summary)) return false;
    if (monologue && timelineTextLooksSame(action, monologue)) return false;
    return true;
  });

  if (!summary && monologue) {
    summary = monologue;
    monologue = '';
  }
  if (!summary && actions.length > 0) {
    summary = actions.shift();
  }

  return {
    summary: summary,
    monologue: monologue,
    actions: actions,
  };
}

function renderTimeline(data) {
  var container = document.getElementById('tickEntries');
  var logs = (data.heartbeatLog || []).slice();

  var deduped = [];
  var prevSignature = '';
  logs.forEach(function(log) {
    var display = buildTimelineDisplay(log);
    var signature = [
      normalizeTimelineText(display.summary),
      normalizeTimelineText(display.monologue),
      display.actions.map(normalizeTimelineText).join('|')
    ].join('@@').trim();

    if (!signature) return;
    if (signature === prevSignature) return;

    deduped.push({ log: log, display: display });
    prevSignature = signature;
  });

  if (deduped.length === 0) {
    var now = new Date();
    var timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    var nextActivity = findNextActivity(data, now);
    var placeholderHtml = '<div class="no-data">暂无行动记录</div>';
    placeholderHtml += '<div style="padding:8px 0;font-size:12px;color:var(--text-dim);">';
    placeholderHtml += '<div>当前时间: ' + escHtml(timeStr) + '</div>';
    if (nextActivity) {
      placeholderHtml += '<div style="margin-top:4px;color:var(--text-secondary);">下一项: ' + escHtml(nextActivity) + '</div>';
    }
    placeholderHtml += '</div>';
    container.innerHTML = placeholderHtml;
    return;
  }

  // --- PLAYBACK MODE: incremental append ---
  if (window._playbackMode) {
    var renderedCount = container.querySelectorAll('.tick-entry').length;

    // If this is the first playback frame or we jumped backwards (seek), rebuild
    if (renderedCount === 0 || deduped.length < renderedCount) {
      container.innerHTML = '';
      renderedCount = 0;
    }

    // Remove 'pb-current' and 'current' from previous entries, add 'pb-past'
    var existingEntries = container.querySelectorAll('.tick-entry');
    existingEntries.forEach(function(entry) {
      entry.classList.remove('current', 'pb-current', 'pb-enter');
      if (!entry.classList.contains('pb-past')) {
        entry.classList.add('pb-past');
      }
    });

    // Append only new entries
    for (var i = renderedCount; i < deduped.length; i++) {
      var log = deduped[i].log;
      var display = deduped[i].display;
      var isCurrent = i === deduped.length - 1;
      var time = log.timestamp ? new Date(log.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '--:--';
      var flowTag = (log.flow_state && log.flow_state !== 'none') ? ' [' + log.flow_state.toUpperCase() + ']' : '';

      var entryEl = document.createElement('div');
      entryEl.className = 'tick-entry pb-enter' + (isCurrent ? ' current pb-current' : '');

      var html = '<div class="tick-time">' + escHtml(time) + flowTag + '</div>';
      html += '<div class="tick-summary">' + escHtml(display.summary || '（无摘要）') + '</div>';
      if (display.monologue) html += '<div class="tick-monologue">"' + escHtml(display.monologue) + '"</div>';
      if (display.actions.length > 0) {
        html += '<div class="tick-actions">';
        display.actions.forEach(function(a) {
          html += '<span class="bouncing">' + escHtml(a) + '</span>';
        });
        html += '</div>';
      }
      entryEl.innerHTML = html;
      container.appendChild(entryEl);
    }

    // Auto-scroll to latest entry
    container.scrollTop = container.scrollHeight;
    previousTickCount = deduped.length;
    return;
  }

  // --- LIVE MODE: original full innerHTML rebuild ---
  var newCount = deduped.length;
  var shouldAnimate = newCount > previousTickCount;
  previousTickCount = newCount;

  container.innerHTML = deduped.map(function(item, i) {
    var log = item.log;
    var display = item.display;
    var isCurrent = i === deduped.length - 1;
    var isNew = shouldAnimate && i === deduped.length - 1;
    var time = log.timestamp ? new Date(log.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '--:--';
    var flowTag = (log.flow_state && log.flow_state !== 'none') ? ' [' + log.flow_state.toUpperCase() + ']' : '';

    var html = '<div class="tick-entry ' + (isCurrent ? 'current' : '') + (isNew ? ' tick-entry-enter' : '') + '">';
    html += '<div class="tick-time">' + escHtml(time) + flowTag + '</div>';
    html += '<div class="tick-summary">' + escHtml(display.summary || '（无摘要）') + '</div>';
    if (display.monologue) html += '<div class="tick-monologue">"' + escHtml(display.monologue) + '"</div>';
    if (display.actions.length > 0) {
      html += '<div class="tick-actions">';
      display.actions.forEach(function(a) {
        html += '<span>' + escHtml(a) + '</span>';
      });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }).join('');
}

// --- [C] Intent Arena ---
function renderIntentArena(data) {
  var container = document.getElementById('intentRows');
  if (!data.intents || !data.intents.intents) {
    container.innerHTML = '<div class="no-data">暂无意念数据</div>';
    return;
  }

  var categories = ['\u521b\u4f5c', '\u793e\u4ea4', '\u7aa5\u5c4f', '\u8868\u8fbe', '\u5b66\u4e60', '\u4f11\u606f', '\u68a6\u60f3'];
  var categoryColors = {
    '\u521b\u4f5c': 'var(--gold-warm)',
    '\u793e\u4ea4': 'var(--blue-sky)',
    '\u7aa5\u5c4f': 'var(--purple-berry)',
    '\u8868\u8fbe': 'var(--terra)',
    '\u5b66\u4e60': 'var(--green-leaf)',
    '\u4f11\u606f': 'var(--brown-light)',
    '\u68a6\u60f3': 'var(--pink-blossom)'
  };

  var intents = data.intents.intents;
  var categoryStats = categories.map(function(cat) {
    var matching = intents.filter(function(i) { return i.category === cat; });
    var maxIntensity = matching.reduce(function(max, i) { return Math.max(max, i.intensity || 0); }, 0);
    var maxResistance = matching.reduce(function(max, i) { return Math.max(max, i.resistance || 0); }, 0);
    var totalSkipped = matching.reduce(function(sum, i) { return sum + (i.skipped_count || 0); }, 0);
    return {
      cat: cat,
      matching: matching,
      maxIntensity: maxIntensity,
      maxResistance: maxResistance,
      totalSkipped: totalSkipped,
      score: maxIntensity + totalSkipped * 0.8,
    };
  });

  var visible = categoryStats
    .filter(function(row) { return row.maxIntensity > 0 || row.totalSkipped > 0; })
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, 4);

  var collapsedCount = categories.length - visible.length;
  if (visible.length === 0) {
    container.innerHTML = '<div class="no-data">当前没有活跃意念</div>';
    return;
  }

  // --- PLAYBACK MODE: diff-update existing rows ---
  if (window._playbackMode) {
    var existingRows = container.querySelectorAll('.intent-row[data-cat]');
    var existingMap = {};
    existingRows.forEach(function(row) {
      existingMap[row.getAttribute('data-cat')] = row;
    });

    var newCats = {};
    visible.forEach(function(row) { newCats[row.cat] = true; });

    // Remove rows no longer visible
    Object.keys(existingMap).forEach(function(cat) {
      if (!newCats[cat]) {
        var row = existingMap[cat];
        row.classList.add('pb-exit');
        setTimeout(function() { if (row.parentNode) row.parentNode.removeChild(row); }, 300);
      }
    });

    // Update or add rows
    visible.forEach(function(row) {
      var intensityPct = Math.min(100, (row.maxIntensity / 10) * 100);
      var resistancePct = Math.min(100, (row.maxResistance / 10) * 100);
      var color = categoryColors[row.cat] || 'var(--brown-mid)';
      var actionable = row.maxIntensity > row.maxResistance;

      if (existingMap[row.cat]) {
        // Update existing row — bar width will CSS-transition
        var existRow = existingMap[row.cat];
        var fill = existRow.querySelector('.intent-bar-fill');
        if (fill) {
          fill.style.width = intensityPct + '%';
          fill.classList.toggle('pulsing', actionable);
        }
        var marker = existRow.querySelector('.intent-resistance-marker');
        if (marker && row.maxResistance > 0) {
          marker.style.left = 'calc(' + resistancePct + '% - 2px)';
        }
        var skip = existRow.querySelector('.intent-skip');
        if (skip) skip.textContent = row.totalSkipped > 0 ? '\u00d7' + row.totalSkipped : '';

        var desc = existRow.nextElementSibling;
        if (desc && desc.classList.contains('intent-desc')) {
          var topIntent = row.matching.reduce(function(best, i) {
            return (i.intensity || 0) > (best.intensity || 0) ? i : best;
          }, row.matching[0]);
          desc.textContent = topIntent && topIntent.description ? topIntent.description : '';
        }
      } else {
        // New category — create with enter animation
        var block = document.createElement('div');
        block.className = 'intent-row pb-enter' + (actionable ? ' actionable' : '');
        block.setAttribute('data-cat', row.cat);
        block.innerHTML = '<span class="intent-category" style="color:' + color + ';border-color:' + color + ';background:var(--bg-inset);">' + row.cat + '</span>' +
          '<div class="intent-bar-track">' +
          '<div class="intent-bar-fill' + (actionable ? ' pulsing' : '') + '" style="width:' + intensityPct + '%;background:' + color + ';opacity:0.65;"></div>' +
          (row.maxResistance > 0 ? '<div class="intent-resistance-marker" style="left:calc(' + resistancePct + '% - 2px);"></div>' : '') +
          '</div>' +
          '<span class="intent-skip">' + (row.totalSkipped > 0 ? '\u00d7' + row.totalSkipped : '') + '</span>';
        container.appendChild(block);

        // Description
        if (row.matching.length > 0) {
          var topIntent = row.matching.reduce(function(best, i) {
            return (i.intensity || 0) > (best.intensity || 0) ? i : best;
          }, row.matching[0]);
          if (topIntent.description) {
            var descEl = document.createElement('div');
            descEl.className = 'intent-desc';
            descEl.textContent = topIntent.description;
            container.appendChild(descEl);
          }
        }
      }
    });
    return;
  }

  // --- LIVE MODE: original full innerHTML rebuild ---
  var html = visible.map(function(row) {
    var actionable = row.maxIntensity > row.maxResistance;
    var intensityPct = Math.min(100, (row.maxIntensity / 10) * 100);
    var resistancePct = Math.min(100, (row.maxResistance / 10) * 100);
    var color = categoryColors[row.cat] || 'var(--brown-mid)';

    var rowClass = 'intent-row';
    if (actionable) rowClass += ' actionable';

    var block = '<div class="' + rowClass + '" data-cat="' + row.cat + '">';
    block += '<span class="intent-category" style="color:' + color + ';border-color:' + color + ';background:var(--bg-inset);">' + row.cat + '</span>';
    block += '<div class="intent-bar-track">';
    block += '<div class="intent-bar-fill" style="width:' + intensityPct + '%;background:' + color + ';opacity:0.65;"></div>';
    if (row.maxResistance > 0) {
      block += '<div class="intent-resistance-marker" style="left:calc(' + resistancePct + '% - 2px);"></div>';
    }
    block += '</div>';
    block += '<span class="intent-skip">' + (row.totalSkipped > 0 ? '\u00d7' + row.totalSkipped : '') + '</span>';
    block += '</div>';

    if (row.matching.length > 0) {
      var topIntent = row.matching.reduce(function(best, i) {
        return (i.intensity || 0) > (best.intensity || 0) ? i : best;
      }, row.matching[0]);
      if (topIntent.description) {
        block += '<div class="intent-desc">' + escHtml(topIntent.description) + '</div>';
      }
    }
    return block;
  }).join('');

  if (collapsedCount > 0) {
    html += '<div class="intent-desc">已折叠 ' + collapsedCount + ' 个低活跃意念（强度<=0 或长期静默）。</div>';
  }

  container.innerHTML = html;
}

// --- [D] Emotion Radar ---
function renderEmotionRadar(data) {
  if (!data.emotion) {
    document.getElementById('moodDesc').textContent = 'NO DATA';
    return;
  }
  var e = data.emotion;

  // Mood description
  document.getElementById('moodDesc').textContent = (e.mood && e.mood.description) || '--';
  document.getElementById('moodCause').textContent = e.recent_cause || '';

  // Stress warning
  var stressWarn = document.getElementById('stressWarning');
  stressWarn.style.display = (e.consecutive_high_stress >= 3) ? 'inline-block' : 'none';

  // Common helpers
  var dims = ['valence', 'arousal', 'energy', 'stress', 'creativity', 'sociability'];
  function getValues(layer) {
    return dims.map(function(d) { return Math.max(0, Math.min(1, (layer && layer[d] != null) ? layer[d] : 0)); });
  }
  function normalizeValence(v) { return (v + 1) / 2; }

  var current = {
    valence: normalizeValence(e.mood ? e.mood.valence : 0),
    arousal: e.mood ? e.mood.arousal : 0,
    energy: e.energy || 0,
    stress: e.stress || 0,
    creativity: e.creativity || 0,
    sociability: e.sociability || 0,
  };
  var rawMomentum = e.momentum || {};
  var momentum = Object.assign({}, rawMomentum, { valence: normalizeValence(rawMomentum.valence || 0) });
  var rawUndertone = e.undertone || {};
  var undertone = Object.assign({}, rawUndertone, { valence: normalizeValence(rawUndertone.valence || 0) });

  var currentVals = getValues(current);
  var momentumVals = getValues(momentum);
  var undertoneVals = getValues(undertone);

  // --- PLAYBACK MODE: use RadarAnimator for smooth morphing ---
  if (window._playbackMode) {
    RadarAnimator.morphTo(currentVals, momentumVals, undertoneVals);

    // Update dimension readout with animation
    var dimLabels = ['\u611f\u53d7', '\u6fc0\u6602', '\u6d3b\u529b', '\u538b\u529b', '\u521b\u9020', '\u793e\u4ea4'];
    var dimKeys = ['valence', 'arousal', 'energy', 'stress', 'creativity', 'sociability'];
    // Ensure dim rows exist (create once, update values)
    var dimContainer = document.getElementById('emotionDims');
    var existingRows = dimContainer.querySelectorAll('.emotion-dim-value');
    if (existingRows.length === 6) {
      // Update existing rows with rolling numbers
      currentVals.forEach(function(val, i) {
        var valEl = existingRows[i];
        var colorStyle = dimKeys[i] === 'stress' && val > 0.6 ? 'var(--terra)' : '';
        valEl.style.color = colorStyle;
        // Animate from current displayed value to new value
        var fromVal = parseFloat(valEl.textContent) || 0;
        if (Math.abs(fromVal - val) > 0.005) {
          NumberAnimator.animate(valEl.id || ('emotionDim' + i), val, 500, function(v) { return v.toFixed(2); });
          if (!valEl.id) valEl.id = 'emotionDim' + i;
        }
      });
    } else {
      // First playback frame — create the rows
      var dimsHtml = '';
      dimLabels.forEach(function(label, i) {
        var val = currentVals[i];
        var colorStyle = dimKeys[i] === 'stress' && val > 0.6 ? 'color:var(--terra);' : '';
        dimsHtml += '<div class="emotion-dim-row"><span class="emotion-dim-label">' + label + '</span><span class="emotion-dim-value" id="emotionDim' + i + '" style="' + colorStyle + '">' + val.toFixed(2) + '</span></div>';
      });
      dimContainer.innerHTML = dimsHtml;
    }
    return;
  }

  // --- LIVE MODE: original full innerHTML rebuild ---
  RadarAnimator.reset(); // ensure clean state when switching from playback to live

  var labels = ['\u611f\u53d7', '\u6fc0\u6602', '\u6d3b\u529b', '\u538b\u529b', '\u521b\u9020', '\u793e\u4ea4'];
  var cx = 130, cy = 130, maxR = 95;
  var angles = dims.map(function(_, i) { return (Math.PI * 2 * i / dims.length) - Math.PI / 2; });

  function polygonPoints(values) {
    return values.map(function(v, i) {
      var r = v * maxR;
      return (cx + r * Math.cos(angles[i])) + ',' + (cy + r * Math.sin(angles[i]));
    }).join(' ');
  }

  var svg = '';

  // Grid rings — subtle earth-tone
  for (var ring = 0.25; ring <= 1; ring += 0.25) {
    var pts = angles.map(function(a) {
      return (cx + maxR * ring * Math.cos(a)) + ',' + (cy + maxR * ring * Math.sin(a));
    }).join(' ');
    svg += '<polygon points="' + pts + '" fill="none" stroke="' + (ring === 1 ? '#B5A68C' : '#E6DFD2') + '" stroke-width="' + (ring === 1 ? '2' : '1') + '"/>';
  }

  // Axes + labels
  angles.forEach(function(a, i) {
    svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + maxR * Math.cos(a)) + '" y2="' + (cy + maxR * Math.sin(a)) + '" stroke="#E6DFD2" stroke-width="1"/>';
    var lx = cx + (maxR + 20) * Math.cos(a);
    var ly = cy + (maxR + 20) * Math.sin(a);
    svg += '<text x="' + lx + '" y="' + ly + '" fill="#7A6E5F" font-size="11" font-family="DotGothic16, sans-serif" text-anchor="middle" dominant-baseline="middle">' + labels[i] + '</text>';
  });

  // Undertone layer (grey)
  svg += '<polygon points="' + polygonPoints(undertoneVals) + '" fill="rgba(181,166,140,0.1)" stroke="#B5A68C" stroke-width="1" stroke-dasharray="4,3"/>';
  // Momentum layer (blue)
  svg += '<polygon points="' + polygonPoints(momentumVals) + '" fill="rgba(123,163,199,0.12)" stroke="#7BA3C7" stroke-width="1.5"/>';
  // Current layer (terra cotta — warm accent)
  svg += '<polygon points="' + polygonPoints(currentVals) + '" fill="rgba(193,120,80,0.15)" stroke="#C17850" stroke-width="2"/>';

  // Data points on current layer — small pixel squares
  currentVals.forEach(function(v, i) {
    var r = v * maxR;
    var px = cx + r * Math.cos(angles[i]);
    var py = cy + r * Math.sin(angles[i]);
    svg += '<rect x="' + (px - 3) + '" y="' + (py - 3) + '" width="6" height="6" fill="#C17850" stroke="#5C4A3A" stroke-width="1"/>';
  });

  document.getElementById('radarSvg').innerHTML = svg;

  // Numeric dimension readout
  var dimsHtml = '';
  var dimLabels2 = ['\u611f\u53d7', '\u6fc0\u6602', '\u6d3b\u529b', '\u538b\u529b', '\u521b\u9020', '\u793e\u4ea4'];
  var dimKeys2 = ['valence', 'arousal', 'energy', 'stress', 'creativity', 'sociability'];
  dimLabels2.forEach(function(label, i) {
    var val = currentVals[i];
    var colorStyle = dimKeys2[i] === 'stress' && val > 0.6 ? 'color:var(--terra);' : '';
    dimsHtml += '<div class="emotion-dim-row"><span class="emotion-dim-label">' + label + '</span><span class="emotion-dim-value" style="' + colorStyle + '">' + val.toFixed(2) + '</span></div>';
  });
  document.getElementById('emotionDims').innerHTML = dimsHtml;
}

// --- [E] Schedule Gantt ---
function renderScheduleGantt(data) {
  var grid = document.getElementById('timetableGrid');
  if (!grid) return;

  if (data.schedule && data.schedule.historical_notice) {
    grid.innerHTML = '<div class="schedule-hint" style="grid-column:1/span 3;">' + escHtml(data.schedule.historical_notice) + '</div>';
    return;
  }

  // Parse a single "HH:MM" token into decimal hours
  function toDecimalSingle(timeStr) {
    var parts = String(timeStr || '').split(':');
    var h = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10) || 0;
    if (Number.isNaN(h)) return NaN;
    return h + m / 60;
  }

  // Parse "HH:MM" or "HH:MM-HH:MM", returns { start, end } in decimal hours
  function parseTimeRange(timeStr) {
    var s = String(timeStr || '');
    var dashIdx = s.indexOf('-');
    if (dashIdx > 0 && s.indexOf(':') < dashIdx) {
      // Range format: "HH:MM-HH:MM"
      var startDec = toDecimalSingle(s.slice(0, dashIdx));
      var endDec = toDecimalSingle(s.slice(dashIdx + 1));
      if (!Number.isNaN(startDec) && !Number.isNaN(endDec)) {
        return { start: startDec, end: endDec };
      }
    }
    // Single time format: "HH:MM"
    var dec = toDecimalSingle(s);
    if (Number.isNaN(dec)) return { start: 0, end: 0 };
    return { start: dec, end: dec };
  }

  // Legacy single-time decimal (used by rigid events)
  function toDecimal(timeStr) {
    var d = toDecimalSingle(timeStr);
    return Number.isNaN(d) ? 0 : d;
  }

  // Format a single "HH:MM" token
  function fmtTimeSingle(timeStr) {
    var parts = String(timeStr || '').split(':');
    var h = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10) || 0;
    if (Number.isNaN(h)) return timeStr || '--:--';
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }

  // Format "HH:MM" or "HH:MM-HH:MM" — preserves range display
  function fmtTime(timeStr) {
    var s = String(timeStr || '');
    var dashIdx = s.indexOf('-');
    if (dashIdx > 0 && s.indexOf(':') < dashIdx) {
      return fmtTimeSingle(s.slice(0, dashIdx)) + '-' + fmtTimeSingle(s.slice(dashIdx + 1));
    }
    return fmtTimeSingle(s);
  }

  // Parse events
  var rigidEvents = ((data.schedule && data.schedule.rigid) || []).map(function(ev) {
    var s = toDecimal(ev.start);
    var e = toDecimal(ev.end);
    if (e <= s) e = s + 1;
    return { start: s, end: e, label: ev.activity || ev.name || '未命名事项', timeText: fmtTime(ev.start) + '-' + fmtTime(ev.end) };
  });

  var flexEvents = ((data.schedule && data.schedule.flexible) || []).map(function(ev) {
    var range = parseTimeRange(ev.preferred_time);
    var s = range.start;
    var e = range.end;
    if (e <= s) {
      // Single time or invalid range: default to 1-hour block centered on start
      s = Math.max(0, s - 0.5);
      e = Math.min(24, s + 1);
    }
    return { start: s, end: e, label: ev.activity || ev.name || ev.intent_category || '弹性任务', timeText: fmtTime(ev.preferred_time) };
  });

  if (rigidEvents.length === 0 && flexEvents.length === 0) {
    grid.innerHTML = '<div class="schedule-empty" style="grid-column:1/span 3;">暂无日程安排</div>';
    return;
  }

  // Determine visible range
  var minHour = 6, maxHour = 22;
  rigidEvents.concat(flexEvents).forEach(function(ev) {
    if (Math.floor(ev.start) < minHour) minHour = Math.floor(ev.start);
    if (Math.ceil(ev.end) > maxHour) maxHour = Math.ceil(ev.end);
  });
  if (maxHour > 24) maxHour = 24;
  var totalHours = maxHour - minHour;
  if (totalHours < 1) totalHours = 1;

  var HOUR_HEIGHT = 32; // px per hour — the fixed row height

  // Build grid: set explicit row template
  // Row 0 = header, Rows 1..totalHours = hour rows
  var rowTemplate = 'auto';
  for (var i = 0; i < totalHours; i++) rowTemplate += ' ' + HOUR_HEIGHT + 'px';
  grid.style.gridTemplateRows = rowTemplate;
  grid.style.gridTemplateColumns = '36px 1fr 1fr';

  var html = '';
  // Column headers
  html += '<div class="tt-col-header tt-col-header-time" style="grid-row:1;grid-column:1;"></div>';
  html += '<div class="tt-col-header tt-col-header-rigid" style="grid-row:1;grid-column:2;">固定</div>';
  html += '<div class="tt-col-header tt-col-header-flex" style="grid-row:1;grid-column:3;">弹性</div>';

  // Hour label cells + empty data cells (for grid lines)
  for (var h = 0; h < totalHours; h++) {
    var hour = minHour + h;
    var gridRow = h + 2; // 1-indexed, row 1 is header
    var label = (hour < 10 ? '0' : '') + hour + ':00';
    var firstClass = h === 0 ? ' tt-cell-first-row' : '';
    html += '<div class="tt-hour-label' + firstClass + '" style="grid-row:' + gridRow + ';grid-column:1;">' + label + '</div>';
    html += '<div class="tt-cell' + firstClass + '" data-col="rigid" data-hour="' + hour + '" style="grid-row:' + gridRow + ';grid-column:2;"></div>';
    html += '<div class="tt-cell' + firstClass + '" data-col="flex" data-hour="' + hour + '" style="grid-row:' + gridRow + ';grid-column:3;"></div>';
  }

  grid.innerHTML = html;

  // Place event blocks using absolute positioning within cells
  function placeEvents(events, colSelector, blockClass) {
    events.forEach(function(ev) {
      // Calculate pixel position
      var topPx = (ev.start - minHour) * HOUR_HEIGHT;
      var heightPx = (ev.end - ev.start) * HOUR_HEIGHT;

      // Find a cell in this column to use as anchor for absolute positioning
      // We'll append to the grid itself and position absolutely
      var block = document.createElement('div');
      block.className = 'tt-block ' + blockClass;
      block.title = ev.label;

      // Time label
      var timeSpan = document.createElement('span');
      timeSpan.className = 'tt-block-time';
      timeSpan.textContent = ev.timeText;
      block.appendChild(timeSpan);

      // Event name
      block.appendChild(document.createTextNode(ev.label));

      // Position: we need to know the column's left/right.
      // Use the first cell of this column as reference
      var refCell = grid.querySelector('[data-col="' + colSelector + '"]');
      if (!refCell) return;

      var gridRect = grid.getBoundingClientRect();
      var cellRect = refCell.getBoundingClientRect();
      var headerCell = grid.querySelector('.tt-col-header-' + colSelector);
      var headerHeight = headerCell ? headerCell.getBoundingClientRect().height : 0;
      // border offset
      var gridBorderTop = parseFloat(getComputedStyle(grid).borderTopWidth) || 0;
      var gridBorderLeft = parseFloat(getComputedStyle(grid).borderLeftWidth) || 0;

      block.style.position = 'absolute';
      block.style.top = (headerHeight + topPx) + 'px';
      block.style.left = (cellRect.left - gridRect.left - gridBorderLeft + 3) + 'px';
      block.style.width = (cellRect.width - 6) + 'px';
      block.style.minHeight = heightPx + 'px';
      // Let text expand beyond if needed but keep minimum as time-proportional
      block.style.height = 'auto';

      grid.appendChild(block);
    });
  }

  placeEvents(rigidEvents, 'rigid', 'gantt-rigid');
  placeEvents(flexEvents, 'flex', 'gantt-flex');

  // Determine "now" — use virtual time in playback mode
  var now;
  if (window._playbackMode && window._playbackHb && window._playbackHb.timestamp) {
    now = new Date(window._playbackHb.timestamp);
  } else {
    now = new Date();
  }
  var nowDecimal = now.getHours() + now.getMinutes() / 60;

  // Apply time-state classes to event blocks (past/active/future)
  if (window._playbackMode) {
    var allBlocks = grid.querySelectorAll('.tt-block');
    allBlocks.forEach(function(block) {
      // Parse time from the block's time span
      var timeSpan = block.querySelector('.tt-block-time');
      if (!timeSpan) return;
      var timeText = timeSpan.textContent || '';
      var dashIdx = timeText.indexOf('-');
      if (dashIdx > 0) {
        var startParts = timeText.slice(0, dashIdx).split(':');
        var endParts = timeText.slice(dashIdx + 1).split(':');
        var evStart = parseInt(startParts[0]) + (parseInt(startParts[1]) || 0) / 60;
        var evEnd = parseInt(endParts[0]) + (parseInt(endParts[1]) || 0) / 60;
        
        block.classList.remove('sched-past', 'sched-active');
        if (nowDecimal >= evEnd) {
          block.classList.add('sched-past');
        } else if (nowDecimal >= evStart && nowDecimal < evEnd) {
          block.classList.add('sched-active');
        }
      }
    });
  }

  // Now marker
  if (nowDecimal >= minHour && nowDecimal <= maxHour) {
    var headerCell = grid.querySelector('.tt-col-header-time');
    var headerHeight = headerCell ? headerCell.getBoundingClientRect().height : 0;
    var markerTop = headerHeight + (nowDecimal - minHour) * HOUR_HEIGHT;
    var marker = document.createElement('div');
    marker.className = 'gantt-now-marker';
    marker.style.top = markerTop + 'px';
    marker.style.left = '36px';
    marker.style.right = '0';
    grid.appendChild(marker);
  }
}

// --- [Travel] Travel Card ---
function renderTravel(data) {
  var container = document.getElementById('travelContent');
  var panel = document.getElementById('travelcard');
  if (!container || !panel) return;

  var ts = data.travelState;
  var spots = data.travelSpots || [];

  if (!ts || !ts.current_city) {
    container.innerHTML = '<div class="no-data">暂无旅行计划</div>';
    return;
  }

  var phaseLabels = {
    arriving: '✈ 刚到达',
    exploring: '🗺 探索中',
    shooting: '📸 拍摄中',
    departing: '🧳 即将离开'
  };
  var phaseClass = 'travel-phase-' + (ts.phase || 'exploring');
  var phaseText = phaseLabels[ts.phase] || ts.phase || '旅行中';

  // Calculate days
  var travelDay = ts.travel_day || 1;
  var totalDays = 1;
  if (ts.arrived_at && ts.planned_departure) {
    var arrMs = new Date(ts.arrived_at + 'T00:00:00').getTime();
    var depMs = new Date(ts.planned_departure + 'T00:00:00').getTime();
    totalDays = Math.max(1, Math.round((depMs - arrMs) / 86400000) + 1);
  }

  var html = '';

  // Header: city + phase
  html += '<div class="travel-header">';
  html += '<span class="travel-city">' + escHtml(ts.current_city) + '</span>';
  if (ts.country) html += '<span class="travel-country">' + escHtml(ts.country) + '</span>';
  html += '<span class="travel-phase-badge ' + phaseClass + '">' + escHtml(phaseText) + '</span>';
  html += '</div>';

  // Meta: travel day, dates, mode
  html += '<div class="travel-meta">';
  html += '<span class="travel-meta-item"><span class="travel-meta-icon">📅</span> Day ' + travelDay + '/' + totalDays + '</span>';
  if (ts.arrived_at) html += '<span class="travel-meta-item"><span class="travel-meta-icon">🛬</span> ' + escHtml(ts.arrived_at) + '</span>';
  if (ts.planned_departure) html += '<span class="travel-meta-item"><span class="travel-meta-icon">🛫</span> ' + escHtml(ts.planned_departure) + '</span>';
  if (ts.travel_mode) {
    var modeLabel = ts.travel_mode === 'solo' ? '独行' : ts.travel_mode;
    html += '<span class="travel-meta-item"><span class="travel-meta-icon">🎒</span> ' + escHtml(modeLabel) + '</span>';
  }
  html += '</div>';

  // Progress bar: travel days
  var dayPct = Math.min(100, (travelDay / totalDays) * 100);
  html += '<div class="bar-container">';
  html += '<span class="bar-label" style="width:auto;">进度</span>';
  html += '<div class="bar-track"><div class="bar-fill" style="width:' + dayPct + '%;background:var(--terra-soft);"></div></div>';
  html += '<span class="bar-value">' + Math.round(dayPct) + '%</span>';
  html += '</div>';

  // Next destination
  if (ts.next_destination) {
    html += '<div style="font-size:11px;color:var(--text-secondary);margin-top:6px;">下一站: <strong>' + escHtml(ts.next_destination) + '</strong></div>';
  }

  // Spots list
  if (spots.length > 0) {
    var visitedCount = spots.filter(function(s) { return s.visited; }).length;
    html += '<div class="travel-spots-title">📍 拍摄点 (' + visitedCount + '/' + spots.length + ' 已打卡)</div>';

    var styleLabels = {
      travel_portrait: '人像',
      travel_food: '美食',
      travel_street: '街拍'
    };

    spots.forEach(function(spot) {
      var visitedClass = spot.visited ? ' travel-spot-visited' : '';
      var checkIcon = spot.visited ? '✅' : '⬜';
      html += '<div class="travel-spot' + visitedClass + '">';
      html += '<span class="travel-spot-check">' + checkIcon + '</span>';
      html += '<div class="travel-spot-info">';
      html += '<div class="travel-spot-name">' + escHtml(spot.name || '') + '</div>';
      if (spot.description) html += '<div class="travel-spot-desc">' + escHtml(spot.description) + '</div>';
      if (spot.best_time) html += '<div class="travel-spot-time">⏰ ' + escHtml(spot.best_time) + '</div>';
      if (spot.style_tags && spot.style_tags.length > 0) {
        html += '<div class="travel-spot-tags">';
        spot.style_tags.forEach(function(tag) {
          var label = styleLabels[tag] || tag;
          html += '<span class="travel-spot-tag">' + escHtml(label) + '</span>';
        });
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';
    });
  }

  container.innerHTML = html;
}

// --- [F] Feed Panel ---
function formatFeedTime(value) {
  if (!value) return '--';
  var d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value).slice(0, 16);
  return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function extractSocialEventsFromLogs(logs) {
  var events = { posts: [], replies: [] };
  (logs || []).forEach(function(log) {
    var text = extractLogText(log);
    if (!text) return;

    var day = log.date || toDateKey(log.timestamp) || todayKey();
    var ts = log.timestamp || day;

    if (/发帖成功|发布成功|按下发布键|发完帖子|发布了帖子|posted|publish/i.test(text)) {
      events.posts.push({
        source: 'heartbeat',
        caption: text,
        posted_at: ts,
        timestamp: ts,
        date: day,
      });
    }

    if (/回复了.+评论|回复.+评论|评论了一句|评论区|reply|comment/i.test(text)) {
      var who = '';
      var whoMatch = text.match(/回复了([^，。！!\n]{1,24})的评论/);
      if (whoMatch) who = whoMatch[1].trim();
      var quotedMatch = text.match(/评论了一句[“\"]([^”\"]+)[”\"]/);
      events.replies.push({
        source: 'heartbeat',
        target: who || '某位用户',
        detail: quotedMatch ? quotedMatch[1] : text,
        timestamp: ts,
        date: day,
      });
    }
  });
  return events;
}

function normalizePostRecord(post) {
  var hashtags = [];
  if (Array.isArray(post.hashtags)) hashtags = post.hashtags;
  else if (typeof post.hashtags === 'string') hashtags = post.hashtags.split(/\s+/).filter(Boolean);

  var ts = post.posted_at || post.timestamp || post.created_at || post.updated_at || null;
  var caption = post.caption || post.content || post.text || post.title || '';
  if (typeof caption === 'string') caption = caption.trim();

  return {
    source: post.source || 'post-history',
    platform: String(post.platform || post.channel || 'instagram').toLowerCase(),
    kind: post.kind || 'post',
    caption: caption,
    image_url: post.image_url || post.image || post.cover_url || '',
    image_urls: post.image_urls || [],
    hashtags: hashtags,
    posted_at: ts,
    timestamp: ts,
    date: post.date || toDateKey(ts) || null,
    stats: post.stats || null,
  };
}

function uniqueByKey(items, keyFn) {
  var seen = new Set();
  return (items || []).filter(function(item) {
    var k = keyFn(item);
    if (!k) return true;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

function renderFeed(data) {
  renderFeedDiary(data);
  renderFeedPosts(data);
  renderFeedInspiration(data);
  renderFeedReplies(data);
}

function renderFeedPosts(data) {
  var container = document.getElementById('feedInsPostsScroll');
  if (!container) return;

  var historyPosts = (data.postHistory || [])
    .map(normalizePostRecord)
    .filter(function(post) {
      return (!post.platform || post.platform === 'instagram' || post.platform === 'unknown')
        && typeof post.caption === 'string'
        && post.caption.trim().length > 0;
    });

  var posts = uniqueByKey(historyPosts, function(post) {
    return [post.date || '', post.caption || '', post.timestamp || ''].join('@@');
  }).sort(function(a, b) {
    return new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime();
  });

  // Playback mode: time-unlock filter — only show posts published before current virtual time
  if (window._playbackMode && window._playbackHb && window._playbackHb.timestamp) {
    var pbTime = new Date(window._playbackHb.timestamp).getTime();
    posts = posts.filter(function(post) {
      var postTime = new Date(post.posted_at || post.timestamp || 0).getTime();
      return postTime <= pbTime;
    });
  }

  if (posts.length === 0) {

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function findNextActivity(data, now) {
  if (!data.schedule) return null;
  var nowMinutes = now.getHours() * 60 + now.getMinutes();
  var candidates = [];
  if (data.schedule.rigid) {
    data.schedule.rigid.forEach(function(ev) {
      var parts = (ev.start || '').split(':');
      var startMin = parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
      if (startMin > nowMinutes) {
        candidates.push({ time: ev.start, text: ev.activity || ev.name || '', minutes: startMin });
      }
    });
  }
  if (data.schedule.flexible) {
    data.schedule.flexible.forEach(function(ev) {
      var parts = (ev.preferred_time || '').split(':');
      var startMin = parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
      if (startMin > nowMinutes) {
        candidates.push({ time: ev.preferred_time, text: ev.activity || ev.name || '', minutes: startMin });
      }
    });
  }
  if (candidates.length === 0) return null;
  candidates.sort(function(a, b) { return a.minutes - b.minutes; });
  return candidates[0].time + ' ' + candidates[0].text;
}

// --- RadarAnimator: SVG radar polygon morph engine ---
var RadarAnimator = {
  currentPoints: { current: null, momentum: null, undertone: null },
  targetPoints: { current: null, momentum: null, undertone: null },
  animating: false,
  startTime: 0,
  duration: 600, // ms
  polygonEls: { current: null, momentum: null, undertone: null },
  dotEls: [],
  svgInitialized: false,
  dims: ['valence', 'arousal', 'energy', 'stress', 'creativity', 'sociability'],
  labels: ['\u611f\u53d7', '\u6fc0\u6602', '\u6d3b\u529b', '\u538b\u529b', '\u521b\u9020', '\u793e\u4ea4'],
  cx: 130, cy: 130, maxR: 95,

  _angles: function() {
    var self = this;
    return this.dims.map(function(_, i) { return (Math.PI * 2 * i / self.dims.length) - Math.PI / 2; });
  },

  _valuesToPoints: function(values) {
    var self = this;
    var angles = this._angles();
    return values.map(function(v, i) {
      return { x: self.cx + v * self.maxR * Math.cos(angles[i]), y: self.cy + v * self.maxR * Math.sin(angles[i]) };
    });
  },

  _pointsToString: function(pts) {
    return pts.map(function(p) { return p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' ');
  },

  initSvg: function() {
    var svg = document.getElementById('radarSvg');
    if (!svg || this.svgInitialized) return;

    var angles = this._angles();
    var html = '';

    // Grid rings
    for (var ring = 0.25; ring <= 1; ring += 0.25) {
      var pts = angles.map(function(a) {
        return (130 + 95 * ring * Math.cos(a)).toFixed(1) + ',' + (130 + 95 * ring * Math.sin(a)).toFixed(1);
      }).join(' ');
      html += '<polygon points="' + pts + '" fill="none" stroke="' + (ring === 1 ? '#B5A68C' : '#E6DFD2') + '" stroke-width="' + (ring === 1 ? '2' : '1') + '"/>';
    }

    // Axes + labels
    var self = this;
    angles.forEach(function(a, i) {
      html += '<line x1="' + self.cx + '" y1="' + self.cy + '" x2="' + (self.cx + self.maxR * Math.cos(a)).toFixed(1) + '" y2="' + (self.cy + self.maxR * Math.sin(a)).toFixed(1) + '" stroke="#E6DFD2" stroke-width="1"/>';
      var lx = self.cx + (self.maxR + 20) * Math.cos(a);
      var ly = self.cy + (self.maxR + 20) * Math.sin(a);
      html += '<text x="' + lx.toFixed(1) + '" y="' + ly.toFixed(1) + '" fill="#7A6E5F" font-size="11" font-family="DotGothic16, sans-serif" text-anchor="middle" dominant-baseline="middle">' + self.labels[i] + '</text>';
    });

    // Three data polygons (persistent, will be morphed)
    var zeroPoints = angles.map(function(a) { return '130,130'; }).join(' ');
    html += '<polygon id="radarPolyUndertone" class="radar-data-poly" points="' + zeroPoints + '" fill="rgba(181,166,140,0.1)" stroke="#B5A68C" stroke-width="1" stroke-dasharray="4,3"/>';
    html += '<polygon id="radarPolyMomentum" class="radar-data-poly" points="' + zeroPoints + '" fill="rgba(123,163,199,0.12)" stroke="#7BA3C7" stroke-width="1.5"/>';
    html += '<polygon id="radarPolyCurrent" class="radar-data-poly" points="' + zeroPoints + '" fill="rgba(193,120,80,0.15)" stroke="#C17850" stroke-width="2"/>';

    // Six data point squares
    for (var d = 0; d < 6; d++) {
      html += '<rect id="radarDot' + d + '" x="127" y="127" width="6" height="6" fill="#C17850" stroke="#5C4A3A" stroke-width="1"/>';
    }

    svg.innerHTML = html;

    this.polygonEls.undertone = document.getElementById('radarPolyUndertone');
    this.polygonEls.momentum = document.getElementById('radarPolyMomentum');
    this.polygonEls.current = document.getElementById('radarPolyCurrent');
    this.dotEls = [];
    for (var dd = 0; dd < 6; dd++) {
      this.dotEls.push(document.getElementById('radarDot' + dd));
    }
    this.svgInitialized = true;
  },

  morphTo: function(currentVals, momentumVals, undertoneVals) {
    if (!this.svgInitialized) this.initSvg();
    
    this.targetPoints.current = this._valuesToPoints(currentVals);
    this.targetPoints.momentum = this._valuesToPoints(momentumVals);
    this.targetPoints.undertone = this._valuesToPoints(undertoneVals);

    // If no current points yet, snap immediately
    if (!this.currentPoints.current) {
      this.currentPoints.current = this.targetPoints.current;
      this.currentPoints.momentum = this.targetPoints.momentum;
      this.currentPoints.undertone = this.targetPoints.undertone;
      this._applyAll();
      return;
    }

    this.startTime = performance.now();
    if (!this.animating) {
      this.animating = true;
      this._animate();
    }
  },

  _lerpPt: function(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; },
  _lerpArr: function(from, to, t) {
    var self = this;
    return from.map(function(p, i) { return self._lerpPt(p, to[i], t); });
  },

  _easeInOut: function(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; },

  _animate: function() {
    var self = this;
    var elapsed = performance.now() - this.startTime;
    var rawT = Math.min(1, elapsed / this.duration);
    var t = this._easeInOut(rawT);

    var layers = ['current', 'momentum', 'undertone'];
    layers.forEach(function(layer) {
      var interp = self._lerpArr(self.currentPoints[layer], self.targetPoints[layer], t);
      self.polygonEls[layer].setAttribute('points', self._pointsToString(interp));
      if (layer === 'current') {
        interp.forEach(function(p, i) {
          if (self.dotEls[i]) {
            self.dotEls[i].setAttribute('x', (p.x - 3).toFixed(1));
            self.dotEls[i].setAttribute('y', (p.y - 3).toFixed(1));
          }
        });
      }
    });

    if (rawT < 1) {
      requestAnimationFrame(function() { self._animate(); });
    } else {
      this.currentPoints.current = this.targetPoints.current;
      this.currentPoints.momentum = this.targetPoints.momentum;
      this.currentPoints.undertone = this.targetPoints.undertone;
      this.animating = false;
    }
  },

  _applyAll: function() {
    var self = this;
    ['current', 'momentum', 'undertone'].forEach(function(layer) {
      if (self.polygonEls[layer] && self.currentPoints[layer]) {
        self.polygonEls[layer].setAttribute('points', self._pointsToString(self.currentPoints[layer]));
      }
    });
    if (this.currentPoints.current) {
      this.currentPoints.current.forEach(function(p, i) {
        if (self.dotEls[i]) {
          self.dotEls[i].setAttribute('x', (p.x - 3).toFixed(1));
          self.dotEls[i].setAttribute('y', (p.y - 3).toFixed(1));
        }
      });
    }
  },

  reset: function() {
    this.currentPoints = { current: null, momentum: null, undertone: null };
    this.targetPoints = { current: null, momentum: null, undertone: null };
    this.animating = false;
    this.svgInitialized = false;
  }
};

// --- NumberAnimator: numeric value rolling effect ---
var NumberAnimator = {
  _anims: {},

  animate: function(elementId, toVal, duration, formatter) {
    if (!window._playbackMode) return;
    var el = document.getElementById(elementId);
    if (!el) return;

    // Cancel existing animation for this element
    if (this._anims[elementId]) {
      cancelAnimationFrame(this._anims[elementId].raf);
    }

    var fromText = el.textContent || '0';
    var fromVal = parseFloat(fromText.replace(/[^0-9.\-]/g, '')) || 0;
    duration = duration || 400;
    formatter = formatter || function(v) { return Math.round(v).toString(); };

    var startTime = performance.now();
    var anim = { raf: 0 };
    this._anims[elementId] = anim;

    function tick() {
      var elapsed = performance.now() - startTime;
      var t = Math.min(1, elapsed / duration);
      // Ease-out
      var eased = 1 - Math.pow(1 - t, 3);
      var val = fromVal + (toVal - fromVal) * eased;
      el.textContent = formatter(val);

      if (t < 1) {
        anim.raf = requestAnimationFrame(tick);
      } else {
        delete NumberAnimator._anims[elementId];
      }
    }
    anim.raf = requestAnimationFrame(tick);
  },

  cancelAll: function() {
    var keys = Object.keys(this._anims);
    for (var i = 0; i < keys.length; i++) {
      cancelAnimationFrame(this._anims[keys[i]].raf);
    }
    this._anims = {};
  }
};

// --- PanelPulse: detect panel changes and flash borders ---
var PanelPulse = {
  _prevSnapshot: null,

  // Map of data key → panel element ID
  _panelMap: {
    emotion: 'radarcard',
    vitality: 'charcard',
    flow: 'charcard',
    intents: 'intentcard',
    heartbeatLog: 'timelinecard',
    schedule: 'schedulecard'
  },

  check: function(frameData) {
    if (!this._prevSnapshot) {
      this._prevSnapshot = this._snapshot(frameData);
      return;
    }

    var prev = this._prevSnapshot;
    var curr = this._snapshot(frameData);
    var self = this;

    Object.keys(this._panelMap).forEach(function(key) {
      if (curr[key] !== prev[key]) {
        self.pulse(self._panelMap[key]);
      }
    });

    this._prevSnapshot = curr;
  },

  _snapshot: function(data) {
    return {
      emotion: data.emotion ? JSON.stringify(data.emotion.mood || {}) : '',
      vitality: data.vitality ? String(data.vitality.vitality) : '',
      flow: data.flow ? data.flow.status : '',
      intents: data.intents ? JSON.stringify((data.intents.intents || []).map(function(i) { return i.category + ':' + i.intensity; })) : '',
      heartbeatLog: String((data.heartbeatLog || []).length),
      schedule: 'static'
    };
  },

  pulse: function(panelId) {
    var el = document.getElementById(panelId);
    if (!el) return;
    el.classList.remove('panel-pulse');
    // Force reflow to restart animation
    void el.offsetWidth;
    el.classList.add('panel-pulse');
    el.addEventListener('animationend', function handler() {
      el.classList.remove('panel-pulse');
      el.removeEventListener('animationend', handler);
    });
  },

  reset: function() {
    this._prevSnapshot = null;
  }
};

// ============================================
// PLAYBACK ENGINE
// ============================================
var PlaybackEngine = {
  state: 'live',  // 'live' | 'playing' | 'paused'
  speed: 1,
  heartbeats: [],
  currentIndex: 0,
  timer: null,
  fullData: null,  // store full day data for playback

  // Base interval per heartbeat at ×1 speed (ms)
  BASE_INTERVAL: 8000,

  getInterval: function() {
    return this.BASE_INTERVAL / this.speed;
  },

  init: function() {
    var self = this;
    var bar = document.getElementById('playbackBar');
    var playPause = document.getElementById('pbPlayPause');
    var slider = document.getElementById('pbSlider');

    // Speed buttons
    document.querySelectorAll('.pb-speed').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var s = parseInt(btn.dataset.speed);
        self.setSpeed(s);
      });
    });

    // Play/Pause
    playPause.addEventListener('click', function() {
      if (self.state === 'playing') {
        self.pause();
      } else if (self.state === 'paused') {
        self.play();
      }
    });

    // Slider seek
    slider.addEventListener('input', function() {
      var idx = parseInt(slider.value);
      self.seek(idx);
    });
  },

  enterPlayback: function(data) {
    this.fullData = data;
    this.heartbeats = (data.heartbeatLog || []).slice();
    this.currentIndex = 0;
    this.state = 'paused';

    var bar = document.getElementById('playbackBar');
    bar.classList.add('active');

    // Configure slider
    var slider = document.getElementById('pbSlider');
    slider.max = Math.max(0, this.heartbeats.length - 1);
    slider.value = 0;

    // Set time labels
    if (this.heartbeats.length > 0) {
      var first = this.heartbeats[0];
      var last = this.heartbeats[this.heartbeats.length - 1];
      document.getElementById('pbStartLabel').textContent = this.extractTime(first.timestamp);
      document.getElementById('pbEndLabel').textContent = this.extractTime(last.timestamp);
    }

    // Build key moment markers
    this.buildMarkers();

    // Update display
    this.updateDisplay();

    // Auto-play
    this.play();
  },

  exitPlayback: function() {
    this.pause();
    this.state = 'live';
    this.heartbeats = [];
    this.currentIndex = 0;
    this.fullData = null;

    var bar = document.getElementById('playbackBar');
    bar.classList.remove('active');

    // Remove ambient class
    removeAmbientClasses();

    // Clear thought bubble
    ThoughtBubble.hide();

    // Clean up playback enhancement modules
    RadarAnimator.reset();
    NumberAnimator.cancelAll();
    PanelPulse.reset();
    window._playbackMode = false;
    window._playbackIndex = 0;
    window._playbackHb = null;
  },

  play: function() {
    if (this.heartbeats.length === 0) return;
    this.state = 'playing';
    document.getElementById('pbPlayPause').textContent = '⏸ 暂停';
    document.getElementById('pbPlayPause').classList.add('active');
    this.scheduleNext();
  },

  pause: function() {
    this.state = 'paused';
    clearTimeout(this.timer);
    this.timer = null;
    document.getElementById('pbPlayPause').textContent = '▶ 播放';
    document.getElementById('pbPlayPause').classList.remove('active');
  },

  seek: function(index) {
    this.currentIndex = Math.max(0, Math.min(index, this.heartbeats.length - 1));
    this.renderFrame(this.currentIndex);
    this.updateDisplay();
    // If playing, reschedule
    if (this.state === 'playing') {
      clearTimeout(this.timer);
      this.scheduleNext();
    }
  },

  setSpeed: function(s) {
    this.speed = s;
    document.querySelectorAll('.pb-speed').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.speed) === s);
    });
    // Reschedule if playing
    if (this.state === 'playing') {
      clearTimeout(this.timer);
      this.scheduleNext();
    }
  },

  scheduleNext: function() {
    var self = this;
    if (this.currentIndex >= this.heartbeats.length - 1) {
      // Reached end
      this.pause();
      return;
    }
    this.timer = setTimeout(function() {
      self.currentIndex++;
      self.renderFrame(self.currentIndex);
      self.updateDisplay();
      self.scheduleNext();
    }, this.getInterval());
  },

  renderFrame: function(index) {
    var hb = this.heartbeats[index];
    if (!hb || !this.fullData) return;

    // Build a synthetic data object representing state at this heartbeat
    var frameData = Object.assign({}, this.fullData);

    // Override with heartbeat-specific data if available
    if (hb.emotion_snapshot) frameData.emotion = hb.emotion_snapshot;
    if (hb.vitality_snapshot) frameData.vitality = hb.vitality_snapshot;
    if (hb.flow_state) {
      frameData.flow = frameData.flow || {};
      frameData.flow.status = hb.flow_state;
    }
    if (hb.intent_snapshot) frameData.intents = hb.intent_snapshot;

    // Heartbeat log up to current index
    frameData.heartbeatLog = this.heartbeats.slice(0, index + 1);

    // Render with animation flags
    window._playbackMode = true;
    window._playbackIndex = index;
    window._playbackHb = hb;
    render(frameData);

    // Panel pulse — detect which panels changed and flash their borders
    PanelPulse.check(frameData);

    // Apply breathing animations
    BreathingSystem.update(frameData);

    // Apply ambient atmosphere
    AmbientSystem.update(hb.timestamp);

    // Show thought bubble
    ThoughtBubble.show(hb.inner_monologue, frameData.emotion);

    // Check for event toasts
    EventToasts.checkHeartbeat(hb, index > 0 ? this.heartbeats[index - 1] : null);

    // Update enhanced status bar
    NarrativeStatusBar.update(hb, index, this.heartbeats.length, frameData);

    window._playbackMode = false;
  },

  updateDisplay: function() {
    var slider = document.getElementById('pbSlider');
    slider.value = this.currentIndex;

    var hb = this.heartbeats[this.currentIndex];
    var timeStr = hb ? this.extractTime(hb.timestamp) : '--:--';
    document.getElementById('pbTimeDisplay').textContent = timeStr;
    document.getElementById('pbCounter').textContent = '心跳 ' + (this.currentIndex + 1) + '/' + this.heartbeats.length;
  },

  extractTime: function(ts) {
    if (!ts) return '--:--';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '--:--';
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  },

  buildMarkers: function() {
    var container = document.getElementById('pbMarkers');
    container.innerHTML = '';
    if (this.heartbeats.length < 2) return;

    var self = this;
    var total = this.heartbeats.length;

    this.heartbeats.forEach(function(hb, i) {
      var markers = self.detectKeyMoments(hb, i > 0 ? self.heartbeats[i - 1] : null);
      markers.forEach(function(m) {
        var el = document.createElement('div');
        el.className = 'pb-marker ' + m.type;
        el.style.left = ((i / (total - 1)) * 100) + '%';
        el.title = m.label;
        el.addEventListener('click', function() {
          self.seek(i);
        });
        container.appendChild(el);
      });
    });
  },

  detectKeyMoments: function(hb, prevHb) {
    var moments = [];
    // Flow state change
    if (hb.flow_state && hb.flow_state !== 'none') {
      if (!prevHb || prevHb.flow_state !== hb.flow_state) {
        moments.push({ type: 'flow', label: hb.flow_state === 'flow' ? '进入心流' : '进入摸鱼' });
      }
    }
    // Post event
    var text = extractLogText(hb);
    if (/发帖|发布|posted|publish/i.test(text)) {
      moments.push({ type: 'post', label: '发帖事件' });
    }
    // Chat
    if (/聊天|回复|评论|chat|reply/i.test(text)) {
      moments.push({ type: 'chat', label: '社交互动' });
    }
    // Emotion big swing (check snapshot if available)
    if (hb.emotion_snapshot && prevHb && prevHb.emotion_snapshot) {
      var dims = ['valence', 'arousal', 'stress', 'energy'];
      var swing = false;
      dims.forEach(function(d) {
        var cur = hb.emotion_snapshot[d] || hb.emotion_snapshot.mood && hb.emotion_snapshot.mood[d] || 0;
        var prev = prevHb.emotion_snapshot[d] || prevHb.emotion_snapshot.mood && prevHb.emotion_snapshot.mood[d] || 0;
        if (Math.abs(cur - prev) > 0.3) swing = true;
      });
      if (swing) moments.push({ type: 'emotion', label: '情绪大波动' });
    }
    return moments;
  }
};

// ============================================
// BREATHING SYSTEM
// ============================================
var BreathingSystem = {
  update: function(data) {
    var avatar = document.getElementById('charAvatar');
    if (!avatar) return;

    // Reset classes
    avatar.classList.remove('breathing', 'breathing-fast', 'breathing-slow', 'drifting', 'flow-glow');

    var flow = data.flow;
    var vit = data.vitality ? data.vitality.vitality : 50;
    var arousal = 0;
    if (data.emotion && data.emotion.mood) arousal = data.emotion.mood.arousal || 0;

    if (flow && flow.status === 'flow') {
      avatar.classList.add('flow-glow');
    } else if (flow && flow.status === 'drift') {
      avatar.classList.add('drifting');
    } else if (arousal > 0.7) {
      avatar.classList.add('breathing-fast');
    } else if (vit < 30) {
      avatar.classList.add('breathing-slow');
    } else {
      avatar.classList.add('breathing');
    }

    // Animate bars
    this.animateBars(data);
  },

  animateBars: function(data) {
    var vitBar = document.getElementById('barVitality');
    var confBar = document.getElementById('barConfidence');
    var impBar = document.getElementById('barPostImpulse');

    if (vitBar) {
      vitBar.classList.add('alive');
      // Color: warm orange when high, cold gray when low
      var vit = data.vitality ? data.vitality.vitality : 0;

      else if (vit > 30) vitBar.style.background = 'var(--gold-warm)';
      else vitBar.style.background = 'var(--brown-light)';
    }

    if (confBar) confBar.classList.add('alive');

    if (impBar) {

        impBar.classList.remove('alive');

        impBar.classList.remove('impulse-danger');

        impBar.style.background = 'var(--pink-blossom)';
      }

  }
};

// ============================================
// AMBIENT ATMOSPHERE SYSTEM
// ============================================
var AmbientSystem = {
  currentClass: '',

  update: function(timestamp) {
    if (!timestamp) return;
    var d = new Date(timestamp);
    if (isNaN(d.getTime())) return;
    var hour = d.getHours();

    var newClass = '';
    if (hour >= 6 && hour < 8) newClass = 'ambient-dawn';
    else if (hour >= 8 && hour < 12) newClass = 'ambient-morning';
    else if (hour >= 12 && hour < 14) newClass = 'ambient-noon';
    else if (hour >= 14 && hour < 18) newClass = 'ambient-afternoon';
    else if (hour >= 18 && hour < 21) newClass = 'ambient-evening';
    else if (hour >= 21 || hour < 6) newClass = 'ambient-night';

    if (newClass !== this.currentClass) {
      removeAmbientClasses();
      if (newClass) document.body.classList.add(newClass);
      this.currentClass = newClass;
    }
  }
};

function removeAmbientClasses() {
  var classes = ['ambient-dawn', 'ambient-morning', 'ambient-noon', 'ambient-afternoon', 'ambient-evening', 'ambient-night'];
  classes.forEach(function(c) { document.body.classList.remove(c); });
  AmbientSystem.currentClass = '';
}

// ============================================
// THOUGHT BUBBLE
// ============================================
var ThoughtBubble = {
  timer: null,
  typeTimer: null,

  show: function(text, emotion) {
    var bubble = document.getElementById('thoughtBubble');
    if (!bubble) return;
    if (!text || !text.trim()) {
      this.hide();
      return;
    }

    // Clear previous
    clearTimeout(this.timer);
    clearInterval(this.typeTimer);

    // Set mood class
    bubble.classList.remove('mood-happy', 'mood-anxious', 'mood-excited');
    if (emotion && emotion.mood) {
      var valence = emotion.mood.valence || 0;
      var arousal = emotion.mood.arousal || 0;
      if (valence > 0.3) bubble.classList.add('mood-happy');
      else if (valence < -0.3 || (emotion.stress && emotion.stress > 0.6)) bubble.classList.add('mood-anxious');
      else if (arousal > 0.6) bubble.classList.add('mood-excited');
    }

    // Typewriter effect
    bubble.textContent = '';
    bubble.classList.add('visible');
    var chars = text.split('');
    var i = 0;
    this.typeTimer = setInterval(function() {
      if (i < chars.length) {
        bubble.textContent += chars[i];
        i++;
      } else {
        clearInterval(ThoughtBubble.typeTimer);
      }
    }, 50);

    // Auto-hide after display time (proportional to text length)
    var displayTime = Math.max(4000, text.length * 80);
    this.timer = setTimeout(function() {
      bubble.classList.remove('visible');
    }, displayTime);
  },

  hide: function() {
    clearTimeout(this.timer);
    clearInterval(this.typeTimer);
    var bubble = document.getElementById('thoughtBubble');
    if (bubble) {
      bubble.classList.remove('visible');
      bubble.textContent = '';
    }
  }
};

// ============================================
// EVENT TOASTS
// ============================================
var EventToasts = {
  checkHeartbeat: function(hb, prevHb) {
    var text = extractLogText(hb);

    // Flow state change
    if (hb.flow_state === 'flow' && (!prevHb || prevHb.flow_state !== 'flow')) {
      this.show('🔥', '水瀬进入了心流状态！', 'flow-enter');
      this.flashEffect('flow');
    }
    if (hb.flow_state === 'drift' && (!prevHb || prevHb.flow_state !== 'drift')) {
      this.show('😴', '水瀬在摸鱼...', 'drift-event');
      this.flashEffect('drift');
    }
    if (prevHb && prevHb.flow_state === 'flow' && hb.flow_state !== 'flow') {
      this.show('💨', '水瀬离开了心流', 'flow-exit');
    }

    // Post event
    if (/发帖|发布|posted|publish/i.test(text)) {
      this.show('📸', '水瀬发布了一条帖子！', 'post-event');
    }

    // Chat event
    if (/聊天|开始.*对话|chat|conversation/i.test(text)) {
      this.show('💬', '水瀬开始聊天', 'chat-event');
    }
  },

  show: function(icon, message, className) {
    var container = document.getElementById('eventToasts');
    if (!container) return;

    var toast = document.createElement('div');
    toast.className = 'event-toast ' + (className || '');
    toast.innerHTML = '<span class="event-toast-icon">' + icon + '</span>' + escHtml(message);
    container.appendChild(toast);

    // Auto-remove after 2.5s
    setTimeout(function() {
      toast.classList.add('leaving');
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }, 2500);
  },

  flashEffect: function(type) {
    var overlay = document.createElement('div');
    overlay.className = type === 'flow' ? 'flow-flash-overlay' : 'drift-wash-overlay';
    document.body.appendChild(overlay);
    setTimeout(function() {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }, type === 'flow' ? 800 : 1500);
  }
};

// ============================================
// INTEGRATE PLAYBACK WITH DATE SELECTOR + CTA
// ============================================
(function() {
  var origSelect = document.getElementById('daySelect');
  var origReset = document.getElementById('dayReset');
  var replayCta = document.getElementById('replayCta');

  // --- Helper: update CTA button state ---
  function updateCtaState() {
    if (!replayCta) return;
    if (PlaybackEngine.state !== 'live') {
      replayCta.textContent = '■ 停止';
      replayCta.classList.add('is-playing');
      replayCta.title = '退出回放模式，返回实时';
    } else {
      replayCta.textContent = '▶ 回放';
      replayCta.classList.remove('is-playing');
      var sel = origSelect ? origSelect.value : '';
      replayCta.title = sel ? '点击回放 ' + sel : '点击回放最近一天';
    }
  }

  // --- Date select: any date (including today) triggers playback ---
  if (origSelect) {
    origSelect.addEventListener('change', function() {
      var val = origSelect.value;
      if (val) {
        // Any specific date — enter playback mode after data loads
        window._pendingPlayback = true;
      } else {
        // "all" — exit playback
        PlaybackEngine.exitPlayback();
        NarrativeStatusBar.reset();
      }
      updateCtaState();
    });
  }

  // --- Reset button: exit playback ---
  if (origReset) {
    origReset.addEventListener('click', function() {
      PlaybackEngine.exitPlayback();
      NarrativeStatusBar.reset();
      updateCtaState();
    });
  }

  // --- CTA Replay button: smart one-click playback ---
  if (replayCta) {
    replayCta.addEventListener('click', function() {
      // If currently playing — stop
      if (PlaybackEngine.state !== 'live') {
        PlaybackEngine.exitPlayback();
        NarrativeStatusBar.reset();
        updateCtaState();
        return;
      }

      // If a date is selected, trigger its playback
      var sel = origSelect ? origSelect.value : '';
      if (sel) {
        window._pendingPlayback = true;
        // Re-trigger the date filter fetch
        if (typeof filterByDate === 'function') {
          filterByDate(sel);
        }
        updateCtaState();
        return;
      }

      // No date selected — auto-pick the latest date with data
      if (origSelect && origSelect.options.length > 1) {
        // options[0] is "全部日期", pick the first real date option
        var firstDate = origSelect.options[1].value;
        origSelect.value = firstDate;
        origSelect.dispatchEvent(new Event('change'));
      }
    });
  }

  // --- Hook into render to detect when playback data arrives ---
  var origRender = window.render;
  window.render = function(data) {
    origRender(data);

    // If pending playback and we have heartbeat data
    if (window._pendingPlayback && data.heartbeatLog && data.heartbeatLog.length > 0) {
      window._pendingPlayback = false;
      PlaybackEngine.enterPlayback(data);
      updateCtaState();
    }

    // Always apply breathing in live mode too
    if (PlaybackEngine.state === 'live') {
      BreathingSystem.update(data);
    }
  };

  // Initial CTA state
  updateCtaState();
})();

// Initialize playback engine
PlaybackEngine.init();

// Apply breathing animations on first load
setTimeout(function() {
  var avatar = document.getElementById('charAvatar');
  if (avatar) avatar.classList.add('breathing');
}, 1000);
</script>
