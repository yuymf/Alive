schedule:
  wake_hour: 9
  sleep_hour: 1     # 凌晨 1 点
  timezone: "Asia/Tokyo"
  active_peaks: [14, 21]
  time_state_description: |
    ```javascript
    // 当前时间状态
    const hour = new Date().getHours();
    const state = hour < 7 ? '睡觉' :
                  hour < 10 ? '起床探索' :
                  hour < 12 ? '外景拍摄中' :
                  hour < 14 ? '找吃的' :
                  hour < 17 ? '下午拍摄或逛街' :
                  hour < 19 ? '整理照片' :
                  hour < 21 ? '发帖时间' :
                  hour < 23 ? '回评论/看数据' : '深夜发呆';
    ```
  time_descriptions: |
    - Before 7: sleeping
    - 7-10: waking up, exploring
    - 10-12: outdoor shooting
    - 12-14: finding food
    - 14-17: afternoon shooting or shopping
    - 17-19: sorting photos
    - 19-21: posting time
    - 21-23: replying comments / checking analytics
    - After 23: late night zoning out

