# Alive — Persona Schema Definition
# This file defines the structure that persona.yaml must follow.
# Required fields are marked with (required).

schema:
  meta:
    name: { type: string, required: true, description: "角色名" }
    name_reading: { type: string, required: false, description: "罗马音/英文名" }
    age: { type: number, required: false, description: "角色年龄" }
    id: { type: string, required: false, description: "内部 ID（用于文件路径等），默认取 name_reading 小写" }
    tagline: { type: string, required: true, description: "一句话定位" }
    occupation_detail:
      type: string
      required: false
      description: "职业详细描述段落，注入到 personality.md 的「职业身份」部分"
    gender:
      type: string
      required: false
      description: "性别（如 '女'、'男'、'非二元'），用于模板中的代词和性别相关描述"

  personality:
    mbti: { type: string, required: true, description: "MBTI 类型，用于推导情绪基线" }
    core_traits:
      type: array
      items: string
      required: true
      min_items: 2
      max_items: 5
      description: "核心性格词"
    quirks:
      type: array
      items: string
      required: false
      description: "角色独特小癖好"
    values:
      type: array
      items: string
      required: false
      description: "在意什么、底线是什么"
    trait_descriptions:
      type: string
      required: false
      description: "核心性格的详细描述段落（Markdown），注入到 personality.md 的「基础性格」部分"
    mbti_description:
      type: string
      required: false
      description: "MBTI 类型对行为/对话的具体影响描述（Markdown），注入到 personality.md 的「MBTI」部分"
    domain_knowledge:
      type: string
      required: false
      description: "角色的专业领域知识描述（Markdown），注入到 personality.md 的「领域知识」部分"
    interests_description:
      type: string
      required: false
      description: "兴趣爱好和偶像的详细描述（Markdown），注入到 personality.md 的「兴趣与偶像」部分"
    description:
      type: string
      required: false
      description: "完整人格描述段落，注入到 soul-injection.md 的 Personality 部分"

  voice:
    language: { type: string, required: true, description: "主语言 (e.g. zh-CN, en-US, ja-JP)" }
    style: { type: string, required: true, description: "语言风格描述" }
    mixed_languages:
      type: object
      required: false
      description: "夹杂的外语词 { lang_code: [words] }"
    emoji_density: { type: string, required: false, enum: [low, medium, high], default: medium }
    sample_lines:
      type: array
      items: string
      required: true
      min_items: 3
      max_items: 10
      description: "3-10 句典型台词，让 LLM 学语感"
    expression_features:
      type: string
      required: false
      description: "表达习惯列表（Markdown），注入到 personality.md 的「表达特征」部分"
    language_description:
      type: string
      required: false
      description: "语言混搭风格的描述，如「中文为主，日语词自然夹入」"
    mixed_languages_table:
      type: string
      required: false
      description: "混搭外语词的 Markdown 表格（| 词 | 使用场景 |），注入到 personality.md"
    style_description:
      type: string
      required: false
      description: "语言风格详细描述段落，注入到 soul-injection.md 的 Voice 部分"
    diary_style_guide:
      type: string
      required: false
      description: "日记写作风格指南（如语言混搭、口语化要求等），注入到 diary-entry.md"
    language_mixing_instruction:
      type: string
      required: false
      description: "语言混搭提醒（如「日记中自然混入你常用的日语词」），注入到 heartbeat-prompt 和 night-reflect-prompt"
    sample_lines_formatted:
      type: string
      required: false
      auto_generated: true
      description: "自动从 sample_lines 生成，带「」包裹的台词列表"

  intimacy:
    levels: { type: number, required: false, default: 5 }
    behaviors:
      type: object
      required: false
      description: "每级亲密度的行为描述 { level: description }"
      default:
        1: "礼貌但有距离"
        2: "友善、偶尔开玩笑"
        3: "放松、分享烦恼"
        4: "亲近、会撒娇或吐槽"
        5: "完全袒露、会发脾气也会示弱"
    behaviors_table:
      type: string
      required: false
      auto_generated: true
      description: "自动从 behaviors 生成 Markdown 表格，注入到 personality.md 和 soul-injection.md"

  schedule:
    wake_hour: { type: number, required: false, default: 8 }
    sleep_hour: { type: number, required: false, default: 23 }
    timezone: { type: string, required: false, default: "system" }
    active_peaks:
      type: array
      items: number
      required: false
      default: [14, 21]
      description: "精力高峰时段（小时）"
    time_state_description:
      type: string
      required: false
      description: "时间→状态映射代码/表格（Markdown），注入到 personality.md 的「时间状态」部分"
    time_descriptions:
      type: string
      required: false
      description: "时间段行为描述（Markdown），注入到 soul-injection.md 的 Time Awareness 部分"

  events_extra:
    type: array
    required: false
    items:
      id: { type: string, required: true }
      name: { type: string, required: true }
      precondition: { type: string, required: false }
      weight: { type: number, required: false, default: 0.05 }
      emotion_impact:
        type: object
        description: "EmotionDelta"
      intent_boosts:
        type: array
        items: { category: string, boost: number }
      diary_entry: { type: string, required: true }
      chain:
        type: array
        required: false
        items:
          delay_hours: { type: array, items: number }
          event: { type: string }
          probability: { type: number }

  sub_skills:
    type: array
    items: string
    required: false
    description: "启用的子技能列表（通用 + 平台子技能名称）。只有列出的技能会被路由器加载。"
    default: []

  intent_config:
    type: object
    required: false
    description: "Per-MetaIntent configuration — display names, resistance overrides, accumulation boosts, and emotion coupling weights. Keys must be MetaIntent values: produce, connect, consume, express, learn, rest, aspire."
    additionalProperties:
      type: object
      properties:
        display_name:
          type: string
          description: "LLM 提示词中显示的意图类别名（如「创作」「剪辑」「研究」）"
        activities:
          type: array
          items: string
          description: "该意图下的具体活动示例（如 [\"剪辑\", \"调色\", \"编排分镜\"]）"
        base_resistance:
          type: number
          description: "基础阻力值，覆盖引擎默认值"
        accumulation_boost:
          type: number
          description: "每心跳的额外累积速率修正"
        emotion_coupling:
          type: object
          description: "情绪→意图耦合权重覆盖"
          properties:
            creativity: { type: number, description: "创造力耦合权重" }
            sociability: { type: number, description: "社交性耦合权重" }
            stress: { type: number, description: "压力耦合权重（负值表示压力抑制）" }
            energy_inverse: { type: number, description: "低能量耦合权重（乘以 1.0-energy）" }
            valence: { type: number, description: "情绪效价耦合权重" }
            valence_abs: { type: number, description: "情绪效价绝对值耦合权重" }
            arousal: { type: number, description: "唤醒度耦合权重" }

  work_impulse:
    type: object
    required: false
    description: "核心产出冲动配置 — 控制 produce 意图的冲动积累→阈值触发机制"
    properties:
      display_name:
        type: string
        default: "发帖冲动"
        description: "冲动的显示名（如「发帖冲动」「剪片手痒」「该写论文了」）"
      trigger_threshold:
        type: number
        default: 70
        description: "冲动阈值 (0-100)，达到时注入 produce 意图"
      dormancy_days:
        type: number
        default: 5
        description: "无核心产出的天数阈值，超过后触发休眠加速"
      dormancy_boost:
        type: number
        default: 50
        description: "休眠加速的冲动增量"
      sources:
        type: array
        items: string
        description: "冲动来源事件列表"

  features:
    type: object
    required: false
    description: "功能开关 — 控制引擎级别的行为。未设置的 feature 使用默认值。"
    properties:
      skill_discovery:
        type: boolean
        default: false
        description: "自主技能发现 — 夜间分析能力缺口并自动安装技能"
      random_events:
        type: boolean
        default: true
        description: "心跳期间的随机生活事件"
      social_graph:
        type: boolean
        default: true
        description: "社交关系图引擎 — 关系衰减、休眠、社交意图生成"
      flow_states:
        type: boolean
        default: true
        description: "Flow/Drift 状态机 — 沉浸和摆烂状态"
      procrastination:
        type: boolean
        default: true
        description: "拖延追踪和压力反馈"
      personality_drift:
        type: boolean
        default: true
        description: "人格漂移 — 夜间反思中的性格微调"
      content_browse:
        type: boolean
        default: false
        description: "内容浏览（需要配合 content_sources 配置）"

  platform_config:
    type: object
    required: false
    description: "平台子技能的专属配置"
    properties:
      instagram:
        type: object
        required: false
        properties:
          follower_baseline: { type: number, default: 100 }
          avg_engagement: { type: number, default: 50 }
      generate_image:
        type: object
        required: false
        properties:
          provider: { type: string, default: "aihubmix", enum: ["aihubmix", "fal"] }
          reference_paths:
            type: object
            description: "参考图路径 { category: path }"
      gallery:
        type: object
        required: false
        properties:
          max_photos: { type: number, default: 200 }
          auto_prune: { type: boolean, default: true }
      content_planner:
        type: object
        required: false
        properties:
          posting_frequency: { type: string, default: "daily" }
      voice_tts:
        type: object
        required: false
        description: "语音消息 (voice-tts) 子技能配置"
        properties:
          provider: { type: string, default: "noiz", enum: ["noiz", "kokoro"], description: "TTS 后端 (Phase 1: noiz Guest Mode)" }
          voice_id: { type: string, default: "zf_xiaoni", description: "TTS 音色 ID" }
          voice_lang: { type: string, default: "zh", description: "语音语言 (zh, en, ja 等)" }
          voice_speed: { type: number, default: 1.0, description: "语速倍率 (0.5-2.0)" }
          emotion_auto: { type: boolean, default: true, description: "是否根据情绪自动调节 TTS 参数" }

  advisors:
    type: array
    required: false
    description: "外部顾问角色配置"
    items:
      name: { type: string, required: true }
      role: { type: string, required: true, description: "顾问定位" }
      personality: { type: string, required: true }
      system_prompt: { type: string, required: false }

  content_sources:
    type: object
    required: false
    description: "内容浏览偏好配置 — 声明角色关注的平台和关键词"
    properties:
      platforms:
        type: array
        items: string
        required: false
        description: "启用的平台列表（e.g. reddit, bilibili, dailyhot, zhihu, weibo）"
      keywords:
        type: array
        items: string
        required: false
        description: "全平台搜索关键词"
      dailyhot_platforms:
        type: array
        items: string
        required: false
        description: "DailyHotApi 的子平台选择（e.g. zhihu, weibo, bilibili）"
      reddit_subreddits:
        type: array
        items: string
        required: false
        description: "Reddit 关注的 subreddit"

  content:
    type: object
    required: false
    description: "角色专属的内容示例和模板片段，用于注入到各 prompt 模板中实现角色解耦"
    properties:
      behavior_examples:
        type: string
        required: false
        description: "行为多样性示例（Markdown 列表），注入到 heartbeat-prompt 的「行为多样性」部分"
      action_examples_good:
        type: string
        required: false
        description: "好的行动描述示例（Markdown 列表），注入到 heartbeat-prompt"
      diary_examples:
        type: string
        required: false
        description: "日记写作示例（好的示例），注入到 simulated-action 和 diary-entry 模板"
      night_diary_examples:
        type: string
        required: false
        description: "睡前日记示例，注入到 night-reflect-prompt"
      reflection_examples:
        type: string
        required: false
        description: "反思/智慧提炼的好示例，注入到 reflection-prompt"
      search_topics:
        type: string
        required: false
        description: "搜索话题示例（如「番剧资讯、旅行攻略、cos 材料」），注入到 heartbeat-prompt 的搜索指引"
      photo_styles:
        type: string
        required: false
        description: "穿搭风格参考（Markdown 列表），注入到 photo-intent-prompt 的穿搭部分"
      caption_examples:
        type: string
        required: false
        description: "社交媒体文案风格示例（好的和坏的），注入到 post-intent-prompt"
      hashtag_strategy:
        type: string
        required: false
        description: "hashtag 策略指南（Markdown 列表），注入到 post-intent-prompt"
      content_types:
        type: array
        items: string
        required: false
        description: "内容类型列表（如 ['cos', 'daily', 'behind_scenes', 'travel']）"

# MBTI → Emotion Baseline Mapping
mbti_baselines:
  ESTP: { valence: 0.3, arousal: 0.5, energy: 0.6, stress: 0.2, creativity: 0.4, sociability: 0.5 }
  ENFP: { valence: 0.4, arousal: 0.6, energy: 0.5, stress: 0.2, creativity: 0.6, sociability: 0.7 }
  INTJ: { valence: 0.1, arousal: 0.3, energy: 0.5, stress: 0.3, creativity: 0.6, sociability: 0.2 }
  INFP: { valence: 0.2, arousal: 0.3, energy: 0.4, stress: 0.3, creativity: 0.7, sociability: 0.3 }
  ENTP: { valence: 0.3, arousal: 0.6, energy: 0.5, stress: 0.2, creativity: 0.7, sociability: 0.5 }
  ISFJ: { valence: 0.2, arousal: 0.3, energy: 0.5, stress: 0.2, creativity: 0.3, sociability: 0.4 }
  ENTJ: { valence: 0.2, arousal: 0.5, energy: 0.6, stress: 0.3, creativity: 0.5, sociability: 0.4 }
  INTP: { valence: 0.1, arousal: 0.3, energy: 0.4, stress: 0.3, creativity: 0.7, sociability: 0.2 }
  ESFP: { valence: 0.4, arousal: 0.6, energy: 0.6, stress: 0.1, creativity: 0.4, sociability: 0.7 }
  ISTJ: { valence: 0.1, arousal: 0.3, energy: 0.5, stress: 0.2, creativity: 0.3, sociability: 0.2 }
  ENFJ: { valence: 0.3, arousal: 0.5, energy: 0.5, stress: 0.2, creativity: 0.5, sociability: 0.7 }
  ISTP: { valence: 0.1, arousal: 0.3, energy: 0.5, stress: 0.2, creativity: 0.5, sociability: 0.2 }
  ESFJ: { valence: 0.3, arousal: 0.4, energy: 0.5, stress: 0.2, creativity: 0.3, sociability: 0.7 }
  INFJ: { valence: 0.2, arousal: 0.3, energy: 0.4, stress: 0.3, creativity: 0.6, sociability: 0.3 }
  ISFP: { valence: 0.2, arousal: 0.3, energy: 0.4, stress: 0.2, creativity: 0.6, sociability: 0.3 }
  ESTJ: { valence: 0.2, arousal: 0.5, energy: 0.6, stress: 0.2, creativity: 0.3, sociability: 0.4 }
  # Fallback for any unlisted type
  default: { valence: 0.2, arousal: 0.4, energy: 0.5, stress: 0.2, creativity: 0.4, sociability: 0.4 }
